<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Trading Rules</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- SIDEBAR CODE (Enhanced) --- */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 90px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(48, 54, 61, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 1000;
            overflow-y: auto;
        }
        .sidebar-item {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 14px;
            font-size: 1.3rem;
            text-decoration: none;
            color: #8b949e;
            margin-bottom: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-item:hover {
            background: rgba(33, 38, 45, 0.8);
            color: #fff;
            transform: scale(1.1) translateX(2px);
        }
        .sidebar-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        .sidebar-big {
            font-size: 1.8rem !important;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin-bottom: 25px;
        }
        
        /* Theme Variables */
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111111;
            --bg-card: #1a1a1a;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --border-color: #2a2a2a;
            --accent-blue: #2196f3;
            --accent-green: #00c853;
            --accent-purple: #7c4dff;
            --accent-red: #ff5252;
            --accent-warn: #ff9800;
        }
        .theme-white {
            --bg-primary:#f0f2f5;
            --bg-secondary:#ffffff;
            --bg-card:#ffffff;
            --text-primary:#1a1a1a;
            --text-secondary:#6c757d;
            --border-color:#dee2e6;
            --accent-blue:#007bff;
            --accent-green:#28a745;
            --accent-purple:#6f42c1;
            --accent-red:#dc3545;
            --accent-warn:#fd7e14;
        }
        .theme-darkblue {
            --bg-primary:#0a1628;
            --bg-secondary:#0d1f3c;
            --bg-card:#1a3a5c;
            --text-primary:#e0e0e0;
            --text-secondary:#8ab4d8;
            --border-color:#1e3a5f;
            --accent-blue:#42a5f5;
            --accent-green:#00e676;
            --accent-purple:#b39ddb;
            --accent-red:#ef5350;
            --accent-warn:#ffa726;
        }
        .theme-purple {
            --bg-primary:#1a0a2e;
            --bg-secondary:#2d1b4e;
            --bg-card:#3d2b5e;
            --text-primary:#e8d5f5;
            --text-secondary:#b794d4;
            --border-color:#4a2c7a;
            --accent-blue:#7c4dff;
            --accent-green:#69f0ae;
            --accent-purple:#ce93d8;
            --accent-red:#ff6e6e;
            --accent-warn:#ffb74d;
        }
        .theme-darkred {
            --bg-primary:#1a0505;
            --bg-secondary:#2b0a0a;
            --bg-card:#3d1212;
            --text-primary:#ffe6e6;
            --text-secondary:#a87b7b;
            --border-color:#5c1a1a;
            --accent-blue:#64b5f6;
            --accent-green:#66bb6a;
            --accent-purple:#ba68c8;
            --accent-red:#ef5350;
            --accent-warn:#ffb74d;
        }
        .theme-darkbrown {
            --bg-primary:#1e120e;
            --bg-secondary:#331f17;
            --bg-card:#4a2d22;
            --text-primary:#e8dcd4;
            --text-secondary:#a89480;
            --border-color:#5c3a26;
            --accent-blue:#64b5f6;
            --accent-green:#81c784;
            --accent-purple:#ba68c8;
            --accent-red:#e57373;
            --accent-warn:#ffb74d;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px 20px 20px 110px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(33, 150, 243, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(124, 77, 255, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .main-content {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        .rules-box {
            background: rgba(26, 26, 26, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 28px;
            transition: all 0.3s ease;
        }
        
        .rules-box:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }
        
        .rule-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        select {
            width: 100%;
            padding: 12px 14px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 12px;
            font-size: 0.9rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        select:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
        }
        
        select:hover {
            border-color: var(--accent-blue);
        }
        
        .save-btn {
            background: linear-gradient(135deg, var(--accent-green), #009624);
            color: #fff;
            padding: 14px 24px;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 200, 83, 0.4);
        }
        
        .note {
            margin-top: 16px;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            line-height: 1.5;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }
        
        /* Header Controls */
        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            position: absolute;
            top: 20px;
            right: 20px;
        }
        
        .theme-btn {
            background: rgba(26, 26, 26, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }
        
        .theme-btn:hover {
            transform: translateY(-2px);
            border-color: var(--accent-blue);
        }
        
        /* Theme Modal */
        .theme-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
        }
        
        .theme-modal.active {
            display: flex;
        }
        
        .theme-modal-content {
            background: var(--bg-secondary);
            padding: 35px;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 450px;
            width: 90%;
            animation: modalSlide 0.3s ease;
        }
        
        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .theme-modal-content h3 {
            margin-bottom: 25px;
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .theme-option {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.2s;
            margin: 0 auto;
        }
        
        .theme-option:hover {
            transform: scale(1.05);
            border-color: var(--accent-blue);
        }
        
        .close-theme-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        
        .close-theme-btn:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
        
        @media (max-width: 768px) {
            body {
                padding: 20px !important;
            }
            .sidebar {
                display: none;
            }
            .header-controls {
                position: relative;
                top: auto;
                right: auto;
                justify-content: center;
                margin-bottom: 20px;
            }
            .main-content {
                padding-top: 0;
            }
            .theme-options {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <a href="index.html" class="sidebar-item sidebar-big" title="Main Menu">🏠</a>
    <a href="trading.html" class="sidebar-item sidebar-big active" title="Trading Hub">📈</a>
    <div style="width: 50%; border-top: 1px solid rgba(48, 54, 61, 0.5); margin: 10px 0;"></div>
    <a href="calendar.html" class="sidebar-item" title="Calendar">📅</a>
    <a href="journal.html" class="sidebar-item" title="Journal">📝</a>
    <a href="propfirms.html" class="sidebar-item" title="Propfirms">💼</a>
    <a href="rules.html" class="sidebar-item" title="Rules">⚙️</a>
    <a href="analytics.html" class="sidebar-item" title="Analytics">📊</a>
    <a href="payouts.html" class="sidebar-item" title="Payouts">💰</a>
</div>
    <div class="header-controls">
        <button class="theme-btn" id="themeBtn">🎨 Themes</button>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>⚙️ Trading Rules</h1>
            <div class="subtitle">Configure your discipline parameters</div>
        </div>
        
        <div class="rules-box">
            <div class="rule-group">
                <label>📊 Max Trades Per Day</label>
                <select id="maxTrades">
                    <option>None (Disabled)</option>
                    <option>1 Trade</option>
                    <option>2 Trades</option>
                    <option>3 Trades</option>
                    <option>4 Trades</option>
                    <option>5 Trades</option>
                </select>
            </div>
            
            <div class="rule-group">
                <label>⏱️ Revenge Trading Cooldown</label>
                <select id="cooldown">
                    <option>None (Disabled)</option>
                    <option>3 Minutes</option>
                    <option>5 Minutes</option>
                    <option>10 Minutes</option>
                    <option>15 Minutes</option>
                    <option>30 Minutes</option>
                </select>
            </div>
            
            <div class="rule-group">
                <label>⚠️ Max Risk Per Trade</label>
                <select id="maxRisk">
                    <option>None (Disabled)</option>
                    <option>0.25%</option>
                    <option>0.50%</option>
                    <option>0.75%</option>
                    <option>1.00%</option>
                </select>
            </div>
            
            <div class="rule-group">
                <label>📉 Max Daily Drawdown</label>
                <select id="maxDrawdown">
                    <option>None (Disabled)</option>
                    <option>1%</option>
                    <option>2%</option>
                    <option>3%</option>
                </select>
            </div>
            
            <button class="save-btn" id="saveBtn">💾 Save Rules</button>
            <p class="note">💡 Select "None" to disable a specific rule. Rules apply across all trading sessions and will help maintain discipline.</p>
        </div>
    </div>

    <!-- Theme Modal -->
    <div id="themeModal" class="theme-modal">
        <div class="theme-modal-content">
            <h3>🎨 Choose Your Theme</h3>
            <div class="theme-options">
                <div class="theme-option" data-theme="black" style="background:#0d0d0d;"></div>
                <div class="theme-option" data-theme="white" style="background:#f5f5f5;"></div>
                <div class="theme-option" data-theme="darkblue" style="background:#0a1628;"></div>
                <div class="theme-option" data-theme="purple" style="background:#1a0a2e;"></div>
                <div class="theme-option" data-theme="darkred" style="background:#1a0505;"></div>
                <div class="theme-option" data-theme="darkbrown" style="background:#1e120e;"></div>
            </div>
            <button class="close-theme-btn" id="closeThemeBtn">Close</button>
        </div>
    </div>

    <script>
        // ============ THEME SYSTEM ============
        function setTheme(theme) {
            document.body.className = 'theme-' + theme;
            localStorage.setItem('theme', theme);
        }
        
        function applySavedTheme() {
            const savedTheme = localStorage.getItem('theme') || 'black';
            document.body.className = 'theme-' + savedTheme;
        }
        
        applySavedTheme();
        
        // Theme modal handlers
        const themeBtn = document.getElementById('themeBtn');
        const themeModal = document.getElementById('themeModal');
        const closeThemeBtn = document.getElementById('closeThemeBtn');
        
        themeBtn.onclick = () => {
            themeModal.classList.add('active');
        };
        
        closeThemeBtn.onclick = () => {
            themeModal.classList.remove('active');
        };
        
        document.querySelectorAll('.theme-option').forEach(el => {
            el.onclick = () => {
                setTheme(el.dataset.theme);
                themeModal.classList.remove('active');
            };
        });
        
        // Close modal when clicking outside
        window.onclick = (e) => {
            if (e.target === themeModal) {
                themeModal.classList.remove('active');
            }
        };
        
        // ============ RULES LOGIC ============
        // Load saved rules on startup
        const rules = JSON.parse(localStorage.getItem('rules')) || {};
        if (rules.maxTrades) document.getElementById('maxTrades').value = rules.maxTrades;
        if (rules.cooldown) document.getElementById('cooldown').value = rules.cooldown;
        if (rules.maxRisk) document.getElementById('maxRisk').value = rules.maxRisk;
        if (rules.maxDrawdown) document.getElementById('maxDrawdown').value = rules.maxDrawdown;

        // Save rules button logic
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.addEventListener('click', () => {
            const newRules = {
                maxTrades: document.getElementById('maxTrades').value,
                cooldown: document.getElementById('cooldown').value,
                maxRisk: document.getElementById('maxRisk').value,
                maxDrawdown: document.getElementById('maxDrawdown').value
            };
            localStorage.setItem('rules', JSON.stringify(newRules));
            
            // Visual feedback with animation
            const originalText = saveBtn.innerHTML;
            saveBtn.innerHTML = '✅ Saved!';
            saveBtn.style.background = '#00c853';
            
            setTimeout(() => {
                saveBtn.innerHTML = originalText;
                saveBtn.style.background = '';
            }, 1500);
        });
    </script>
</body>
</html>
