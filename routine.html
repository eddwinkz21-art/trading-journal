<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Your Routine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 90px; background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px); border-right: 1px solid rgba(48, 54, 61, 0.5); display: flex; flex-direction: column; align-items: center; padding: 20px 0; z-index: 1000; overflow-y: auto; }
        .sidebar-item { display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; border-radius: 14px; font-size: 1.3rem; text-decoration: none; color: #8b949e; margin-bottom: 10px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-item:hover { background: rgba(33, 38, 45, 0.8); color: #fff; transform: scale(1.1) translateX(2px); }
        .sidebar-item.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        .sidebar-big { font-size: 1.8rem !important; background: linear-gradient(135deg, #667eea, #764ba2); color: white; margin-bottom: 25px; }
        body { padding-left: 110px !important; font-family: 'Inter', sans-serif; background: #0d0d0d; color: #e0e0e0; padding: 20px; min-height: 100vh; transition: all 0.3s ease; }
        
        :root { --bg: #0d0d0d; --card: #1a1a1a; --border: #333; --text: #e0e0e0; --sec: #888; --accent: #00ff88; --warn: #ffaa00; --danger: #ff5252; }
        .theme-white { --bg:#f5f5f5; --card:#fff; --border:#ddd; --text:#1a1a1a; --sec:#666; --accent:#00c853; --warn:#ff9800; --danger:#ff5252; }
        .theme-darkblue { --bg:#0a1628; --card:#1e3a5f; --border:#2a4a7a; --text:#e0e0e0; --sec:#8ab4d8; --accent:#00e676; --warn:#ffa726; --danger:#ef5350; }
        .theme-purple { --bg:#1a0a2e; --card:#3d2b5e; --border:#4a2c7a; --text:#e8d5f5; --sec:#b794d4; --accent:#69f0ae; --warn:#ffb74d; --danger:#ff6e6e; }
        .theme-darkred { --bg:#1a0505; --card:#3d1212; --border:#5c1a1a; --text:#ffe6e6; --sec:#a87b7b; --accent:#66bb6a; --warn:#ffb74d; --danger:#ef5350; }
        .theme-darkbrown { --bg:#1e120e; --card:#4a2d22; --border:#5c3a26; --text:#e8dcd4; --sec:#a89480; --accent:#81c784; --warn:#ffb74d; --danger:#e57373; }
        .theme-black { --bg:#0d0d0d; --card:#1a1a1a; --border:#333; --text:#e0e0e0; --sec:#888; --accent:#00ff88; --warn:#ffaa00; --danger:#ff5252; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { transition: all 0.3s ease; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        h1 { font-size: 1.8rem; font-weight: 800; background: linear-gradient(to right, var(--accent), #00b8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn, .theme-btn { background: rgba(26, 26, 26, 0.7); backdrop-filter: blur(10px); border: 1px solid var(--border); color: var(--text); padding: 8px 14px; border-radius: 10px; text-decoration: none; font-size: 0.9rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
        .back-btn:hover, .theme-btn:hover { border-color: var(--accent); transform: translateY(-2px); }
        .header-controls { display: flex; gap: 10px; }
        
        .container { max-width: 1600px; margin: 0 auto; }
        .routine-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .tab-btn { flex: 1; padding: 12px; background: rgba(26, 26, 26, 0.6); backdrop-filter: blur(10px); border: 1px solid var(--border); color: var(--sec); border-radius: 10px; cursor: pointer; font-size: 0.95rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .tab-btn:hover { background: #252525; color: #fff; }
        .tab-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        
        .tab-content { display: none; background: rgba(26, 26, 26, 0.6); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
        .tab-content.active { display: block; }
        
        /* Workout Exercises */
        .exercises-wrapper {
            max-width: 700px;
            margin: 0 auto;
        }
        
        .muscle-management {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .muscle-select {
            flex: 2;
            min-width: 180px;
            padding: 12px;
            background: #222;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
        }
        .edit-muscle-btn, .add-muscle-btn, .remove-muscle-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .edit-muscle-btn:hover { border-color: var(--accent); color: var(--accent); }
        .add-muscle-btn:hover { border-color: var(--accent); color: var(--accent); }
        .remove-muscle-btn:hover { border-color: var(--danger); color: var(--danger); }
        
        .exercises-list { min-height: 200px; }
        .exercise-row {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .exercise-name-input {
            flex: 2;
            min-width: 180px;
            background: #333;
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
        }
        .sets-input {
            width: 80px;
            background: #333;
            border: none;
            color: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: center;
        }
        .sets-label { font-size: 0.7rem; color: var(--sec); margin-right: 5px; }
        .remove-btn {
            background: transparent;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 5px;
            transition: all 0.2s;
        }
        .add-exercise-btn {
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-top: 10px;
        }
        .save-routine-btn {
            background: linear-gradient(135deg, var(--accent), #00b8ff);
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-size: 0.9rem;
            transition: all 0.3s;
            max-width: 700px;
            margin-left: auto;
            margin-right: auto;
            display: block;
        }
        .save-animation { animation: saveFlash 0.5s ease; }
        @keyframes saveFlash {
            0% { transform: scale(1); background: linear-gradient(135deg, var(--accent), #00b8ff); }
            50% { transform: scale(1.02); background: linear-gradient(135deg, #00e676, #00e5ff); }
            100% { transform: scale(1); background: linear-gradient(135deg, var(--accent), #00b8ff); }
        }
        
        /* Days Preview */
        .days-preview {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-top: 20px;
        }
        .day-card {
            background: linear-gradient(145deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            min-height: 350px;
            display: flex;
            flex-direction: column;
        }
        .day-card:hover { border-color: var(--accent); transform: translateY(-6px); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .day-card-header {
            text-align: center;
            padding-bottom: 15px;
            margin-bottom: 15px;
            border-bottom: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .day-card-header strong { font-size: 1.3rem; color: var(--accent); }
        .rest-badge {
            background: linear-gradient(135deg, rgba(255,170,0,0.2), rgba(255,170,0,0.05));
            color: var(--warn);
            padding: 10px;
            border-radius: 16px;
            font-size: 0.9rem;
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
        }
        .day-muscles { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .muscle-tag {
            background: linear-gradient(135deg, rgba(0,255,136,0.2), rgba(0,255,136,0.05));
            padding: 5px 12px;
            border-radius: 25px;
            font-size: 0.75rem;
            color: var(--accent);
            font-weight: 500;
            border: 1px solid rgba(0,255,136,0.2);
        }
        .day-exercises-preview {
            flex: 1;
            overflow-y: auto;
            max-height: 300px;
            padding-right: 5px;
        }
        .day-exercise-preview {
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }
        .day-exercise-name { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        .day-exercise-sets { font-size: 0.7rem; color: var(--accent); margin-top: 4px; }
        .no-exercises-text { font-size: 0.75rem; color: var(--sec); text-align: center; padding: 15px; font-style: italic; }
        
        @media (max-width: 1400px) { .days-preview { grid-template-columns: repeat(4, 1fr); gap: 16px; } }
        @media (max-width: 1100px) { .days-preview { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 800px) { .days-preview { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .days-preview { grid-template-columns: 1fr; } }
        
        /* Modals */
        .muscle-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2002; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .muscle-modal.active { display: flex; }
        .muscle-modal-content { background: var(--card); border-radius: 28px; width: 90%; max-width: 500px; padding: 24px; border: 1px solid var(--accent); }
        .muscle-modal-content h3 { margin-bottom: 20px; color: var(--accent); font-size: 1.3rem; text-align: center; }
        .muscle-options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-height: 350px; overflow-y: auto; margin-bottom: 20px; }
        .muscle-option { display: flex; align-items: center; gap: 12px; padding: 12px; background: #222; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .muscle-option:hover { background: #333; transform: translateX(5px); }
        .muscle-option input { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; }
        .muscle-option label { flex: 1; cursor: pointer; font-size: 1rem; }
        .rest-option { color: var(--warn); }
        .modal-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .modal-buttons button { flex: 1; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 0.95rem; }
        .confirm-muscle-btn { background: var(--accent); color: #000; border: none; }
        .cancel-muscle-btn { background: transparent; border: 1px solid var(--border); color: var(--sec); }
        
        .day-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .day-modal.active { display: flex; }
        .day-modal-content { background: var(--card); border-radius: 28px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--accent); }
        .day-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); }
        .day-modal-header h3 { color: var(--accent); font-size: 1.3rem; }
        .close-modal-btn { background: transparent; border: none; color: var(--text); font-size: 1.8rem; cursor: pointer; transition: all 0.2s; }
        .day-modal-body { padding: 24px; }
        .action-edit-btn {
            background: rgba(0,255,136,0.15);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .remove-muscle-btn {
            background: rgba(255,82,82,0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .exercise-select-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2001; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .exercise-select-modal.active { display: flex; }
        .exercise-select-content { background: var(--card); border-radius: 28px; width: 90%; max-width: 550px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--accent); }
        .exercise-select-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); }
        .exercise-select-body { padding: 24px; }
        .exercise-checkbox-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px;
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            margin-bottom: 10px;
        }
        .exercise-checkbox-item input { width: 22px; height: 22px; accent-color: var(--accent); cursor: pointer; }
        .exercise-checkbox-item label { flex: 1; cursor: pointer; font-size: 1rem; font-weight: 500; }
        .select-all-btn {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: var(--sec);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 15px;
            font-size: 0.85rem;
            margin-right: 10px;
        }
        .exercise-modal-buttons { display: flex; gap: 12px; margin-top: 25px; }
        .exercise-modal-buttons button { flex: 1; padding: 14px; border-radius: 14px; cursor: pointer; font-weight: 700; font-size: 0.95rem; }
        .confirm-exercise-btn { background: var(--accent); color: #000; border: none; }
        .cancel-exercise-btn { background: transparent; border: 1px solid var(--border); color: var(--sec); }
        
        .add-muscle-modal, .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2003;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        .add-muscle-modal.active, .confirm-modal.active { display: flex; }
        .add-muscle-content, .confirm-modal-content {
            background: var(--card);
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            padding: 28px;
            border: 1px solid var(--accent);
            text-align: center;
        }
        .add-muscle-content input {
            width: 100%;
            padding: 12px;
            background: #222;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 10px;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .add-muscle-buttons, .confirm-modal-buttons { display: flex; gap: 12px; }
        .add-muscle-buttons button, .confirm-modal-buttons button { flex: 1; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .confirm-add-btn, .confirm-yes-btn { background: var(--accent); color: #000; border: none; }
        .confirm-no-btn, .cancel-add-btn { background: transparent; border: 1px solid var(--border); color: var(--sec); }
        
        .theme-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2004; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .theme-modal.active { display: flex; }
        .theme-modal-content { background: var(--card); border-radius: 28px; width: 90%; max-width: 450px; padding: 28px; text-align: center; border: 1px solid var(--accent); }
        .theme-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .theme-option { width: 70px; height: 70px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; margin: 0 auto; }
        
        @media(max-width: 768px) { 
            body { padding-left: 20px !important; } 
            .sidebar { display: none; }
            .muscle-options-grid { grid-template-columns: 1fr; }
            .muscle-management { flex-direction: column; }
            .muscle-select { width: 100%; }
            .days-preview { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>
    <div class="sidebar">
        <a href="index.html" class="sidebar-item sidebar-big">🏠</a>
        <a href="gym.html" class="sidebar-item sidebar-big">💪</a>
        <div style="width: 50%; border-top: 1px solid rgba(48, 54, 61, 0.5); margin: 10px 0;"></div>
        <a href="routine.html" class="sidebar-item active">📋</a>
    </div>

    <div class="container">
        <div class="header">
            <h1>Create Your Routine</h1>
            <div class="header-controls">
                <a href="gym.html" class="back-btn">← Back to Gym</a>
                <button class="theme-btn" id="themeBtn">Themes</button>
            </div>
        </div>

        <div class="routine-tabs">
            <button class="tab-btn active" id="exercisesTabBtn">Workout Exercises</button>
            <button class="tab-btn" id="daysTabBtn">Workout Days</button>
        </div>

        <!-- Exercises Tab -->
        <div id="exercisesPanel" class="tab-content active">
            <div class="exercises-wrapper">
                <p style="margin-bottom:15px; color:var(--sec); text-align:center;">Create exercises for each muscle group</p>
                <div class="muscle-management">
                    <select id="muscleSelect" class="muscle-select"></select>
                    <button class="edit-muscle-btn" id="editMuscleBtn">✏️ Rename</button>
                    <button class="add-muscle-btn" id="addMuscleBtn">➕ Add</button>
                    <button class="remove-muscle-btn" id="removeMuscleBtn">🗑️ Remove</button>
                </div>
                <div id="exercisesContainer" class="exercises-list"></div>
                <button class="save-routine-btn" id="saveExercisesBtn">Save Exercises</button>
            </div>
        </div>

        <!-- Days Tab -->
        <div id="daysPanel" class="tab-content">
            <p style="margin-bottom:15px; color:var(--sec); text-align:center;">Click on a day to select which muscle groups you train</p>
            <div id="daysContainer" class="days-preview"></div>
        </div>
    </div>

    <!-- Muscle Selection Modal (opens when you click on a day) -->
    <div id="muscleModal" class="muscle-modal">
        <div class="muscle-modal-content">
            <h3 id="muscleModalTitle">Select Muscles</h3>
            <div id="muscleOptionsList" class="muscle-options-grid"></div>
            <div class="modal-buttons">
                <button class="cancel-muscle-btn" id="cancelMuscleBtn">Cancel</button>
                <button class="confirm-muscle-btn" id="confirmMuscleBtn">Save</button>
            </div>
        </div>
    </div>

    <!-- Day Modal (shows exercises for selected muscles) -->
    <div id="dayModal" class="day-modal">
        <div class="day-modal-content">
            <div class="day-modal-header">
                <h3 id="dayModalTitle">Monday</h3>
                <button class="close-modal-btn" id="closeDayModalBtn">✕</button>
            </div>
            <div class="day-modal-body">
                <div id="dayExercisesList"></div>
            </div>
        </div>
    </div>

    <!-- Theme Modal -->
    <div id="themeModal" class="theme-modal">
        <div class="theme-modal-content">
            <h3>Choose Your Theme</h3>
            <div class="theme-options">
                <div class="theme-option" data-theme="black" style="background:#0d0d0d;"></div>
                <div class="theme-option" data-theme="white" style="background:#f5f5f5;"></div>
                <div class="theme-option" data-theme="darkblue" style="background:#0a1628;"></div>
                <div class="theme-option" data-theme="purple" style="background:#1a0a2e;"></div>
                <div class="theme-option" data-theme="darkred" style="background:#1a0505;"></div>
                <div class="theme-option" data-theme="darkbrown" style="background:#1e120e;"></div>
            </div>
            <button class="confirm-muscle-btn" id="closeThemeBtn">Close</button>
        </div>
    </div>

    <!-- Add Muscle Modal -->
    <div id="addMuscleModal" class="add-muscle-modal">
        <div class="add-muscle-content">
            <h3 id="addMuscleModalTitle">Add Muscle Group</h3>
            <input type="text" id="newMuscleName" placeholder="Enter muscle group name" maxlength="30">
            <div class="add-muscle-buttons">
                <button class="cancel-add-btn" id="cancelAddMuscleBtn">Cancel</button>
                <button class="confirm-add-btn" id="confirmAddMuscleBtn">Add</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Modal -->
    <div id="confirmModal" class="confirm-modal">
        <div class="confirm-modal-content">
            <h3>⚠️ Delete Muscle Group?</h3>
            <p id="confirmMessage">This will remove ALL exercises for this muscle group.</p>
            <div class="confirm-modal-buttons">
                <button class="confirm-no-btn" id="confirmNoBtn">Cancel</button>
                <button class="confirm-yes-btn" id="confirmYesBtn">Yes, Delete</button>
            </div>
        </div>
    </div>

    <!-- Exercise Selection Modal -->
    <div id="exerciseSelectModal" class="exercise-select-modal">
        <div class="exercise-select-content">
            <div class="exercise-select-header">
                <h3 id="exerciseModalTitle">Select Exercises</h3>
                <button class="close-modal-btn" id="closeExerciseModalBtn">✕</button>
            </div>
            <div class="exercise-select-body">
                <div><button class="select-all-btn" id="selectAllExercisesBtn">✓ Select All</button>
                <button class="select-all-btn" id="deselectAllExercisesBtn">✗ Deselect All</button></div>
                <div id="exercisesCheckboxList"></div>
                <div class="exercise-modal-buttons">
                    <button class="cancel-exercise-btn" id="cancelExerciseBtn">Cancel</button>
                    <button class="confirm-exercise-btn" id="confirmExerciseBtn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============ THEME SYSTEM ============
        function setTheme(theme) {
            document.body.className = 'theme-' + theme;
            localStorage.setItem('theme', theme);
        }
        function applySavedTheme() {
            const savedTheme = localStorage.getItem('theme') || 'black';
            document.body.className = 'theme-' + savedTheme;
        }
        applySavedTheme();
        
        document.getElementById('themeBtn').onclick = () => document.getElementById('themeModal').classList.add('active');
        document.getElementById('closeThemeBtn').onclick = () => document.getElementById('themeModal').classList.remove('active');
        document.querySelectorAll('.theme-option').forEach(el => {
            el.onclick = () => {
                setTheme(el.dataset.theme);
                document.getElementById('themeModal').classList.remove('active');
            };
        });
        
        window.onclick = (e) => {
            if (e.target.classList?.contains('muscle-modal')) e.target.classList.remove('active');
            if (e.target.classList?.contains('day-modal')) e.target.classList.remove('active');
            if (e.target.classList?.contains('exercise-select-modal')) e.target.classList.remove('active');
            if (e.target.classList?.contains('theme-modal')) e.target.classList.remove('active');
            if (e.target.classList?.contains('add-muscle-modal')) e.target.classList.remove('active');
            if (e.target.classList?.contains('confirm-modal')) e.target.classList.remove('active');
        };
        
        // ============ DATA ============
        let deleteCallback = null;
        function showConfirm(message, onConfirm) {
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.add('active');
            deleteCallback = onConfirm;
        }
        document.getElementById('confirmYesBtn').onclick = () => {
            if (deleteCallback) deleteCallback();
            document.getElementById('confirmModal').classList.remove('active');
            deleteCallback = null;
        };
        document.getElementById('confirmNoBtn').onclick = () => {
            document.getElementById('confirmModal').classList.remove('active');
            deleteCallback = null;
        };
        
        let allMuscles = JSON.parse(localStorage.getItem('allMuscles'));
        if (!allMuscles || allMuscles.length === 0) {
            allMuscles = ['Chest', 'Back', 'Shoulders', 'Biceps', 'Triceps', 'Legs', 'Core', 'Cardio'];
        }
        let removedMuscles = JSON.parse(localStorage.getItem('removedMuscles')) || [];
        
        function updateMuscleSelect() {
            const select = document.getElementById('muscleSelect');
            const availableMuscles = allMuscles.filter(m => !removedMuscles.includes(m));
            select.innerHTML = '';
            for (let muscle of availableMuscles) {
                const option = document.createElement('option');
                option.value = muscle;
                option.textContent = muscle;
                select.appendChild(option);
            }
            if (availableMuscles.length > 0) select.value = availableMuscles[0];
        }
        
        function saveMusclesList() {
            localStorage.setItem('allMuscles', JSON.stringify(allMuscles));
            localStorage.setItem('removedMuscles', JSON.stringify(removedMuscles));
        }
        
        let exercisesDB = JSON.parse(localStorage.getItem('gymExercises'));
        if (!exercisesDB) {
            exercisesDB = {};
            for (let muscle of allMuscles) {
                if (!removedMuscles.includes(muscle)) exercisesDB[muscle] = [];
            }
        }
        
        let workoutDays = JSON.parse(localStorage.getItem('gymWorkoutDays'));
        if (!workoutDays) {
            workoutDays = {
                Monday: { muscles: [], exercises: {} },
                Tuesday: { muscles: [], exercises: {} },
                Wednesday: { muscles: [], exercises: {} },
                Thursday: { muscles: [], exercises: {} },
                Friday: { muscles: [], exercises: {} },
                Saturday: { muscles: [], exercises: {} },
                Sunday: { muscles: [], exercises: {} }
            };
        }
        
        let dayOrder = JSON.parse(localStorage.getItem('dayOrder')) || ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        let currentMuscle = allMuscles.filter(m => !removedMuscles.includes(m))[0] || 'Chest';
        let currentEditingDay = null;
        let currentEditingMuscle = null;
        let tempSelectedExercises = [];
        let exercisesSortable = null;
        
        updateMuscleSelect();
        
        // ============ MUSCLE MANAGEMENT ============
        document.getElementById('addMuscleBtn').onclick = () => {
            document.getElementById('addMuscleModalTitle').textContent = 'Add New Muscle Group';
            document.getElementById('newMuscleName').value = '';
            document.getElementById('addMuscleModal').classList.add('active');
            document.getElementById('confirmAddMuscleBtn').onclick = () => {
                const newMuscle = document.getElementById('newMuscleName').value.trim();
                if (newMuscle && !allMuscles.includes(newMuscle) && !removedMuscles.includes(newMuscle)) {
                    allMuscles.push(newMuscle);
                    exercisesDB[newMuscle] = [];
                    localStorage.setItem('gymExercises', JSON.stringify(exercisesDB));
                    saveMusclesList();
                    updateMuscleSelect();
                    renderDays();
                    document.getElementById('addMuscleModal').classList.remove('active');
                    loadExercises();
                } else if (allMuscles.includes(newMuscle) || removedMuscles.includes(newMuscle)) {
                    alert('This muscle group already exists!');
                } else {
                    alert('Please enter a valid name');
                }
            };
        };
        
        document.getElementById('editMuscleBtn').onclick = () => {
            const currentSelected = document.getElementById('muscleSelect').value;
            if (!currentSelected) return;
            document.getElementById('addMuscleModalTitle').textContent = 'Rename Muscle Group';
            document.getElementById('newMuscleName').value = currentSelected;
            document.getElementById('addMuscleModal').classList.add('active');
            document.getElementById('confirmAddMuscleBtn').onclick = () => {
                const newName = document.getElementById('newMuscleName').value.trim();
                if (newName && !allMuscles.includes(newName) && !removedMuscles.includes(newName)) {
                    const idx = allMuscles.indexOf(currentSelected);
                    if (idx !== -1) allMuscles[idx] = newName;
                    exercisesDB[newName] = exercisesDB[currentSelected];
                    delete exercisesDB[currentSelected];
                    for (let day in workoutDays) {
                        if (workoutDays[day].muscles) {
                            const muscleIdx = workoutDays[day].muscles.indexOf(currentSelected);
                            if (muscleIdx !== -1) workoutDays[day].muscles[muscleIdx] = newName;
                        }
                        if (workoutDays[day].exercises && workoutDays[day].exercises[currentSelected]) {
                            workoutDays[day].exercises[newName] = workoutDays[day].exercises[currentSelected];
                            delete workoutDays[day].exercises[currentSelected];
                        }
                    }
                    localStorage.setItem('gymExercises', JSON.stringify(exercisesDB));
                    localStorage.setItem('gymWorkoutDays', JSON.stringify(workoutDays));
                    saveMusclesList();
                    updateMuscleSelect();
                    renderDays();
                    document.getElementById('addMuscleModal').classList.remove('active');
                    loadExercises();
                } else if (allMuscles.includes(newName) || removedMuscles.includes(newName)) {
                    alert('A muscle group with this name already exists!');
                } else {
                    alert('Please enter a valid name');
                }
            };
        };
        
        document.getElementById('removeMuscleBtn').onclick = () => {
            const currentSelected = document.getElementById('muscleSelect').value;
            if (!currentSelected) return;
            showConfirm(`Delete "${currentSelected}"? All exercises for this muscle will be removed.`, () => {
                const idx = allMuscles.indexOf(currentSelected);
                if (idx !== -1) allMuscles.splice(idx, 1);
                removedMuscles.push(currentSelected);
                delete exercisesDB[currentSelected];
                for (let day in workoutDays) {
                    if (workoutDays[day].muscles) {
                        const muscleIdx = workoutDays[day].muscles.indexOf(currentSelected);
                        if (muscleIdx !== -1) workoutDays[day].muscles.splice(muscleIdx, 1);
                    }
                    if (workoutDays[day].exercises && workoutDays[day].exercises[currentSelected]) {
                        delete workoutDays[day].exercises[currentSelected];
                    }
                }
                localStorage.setItem('gymExercises', JSON.stringify(exercisesDB));
                localStorage.setItem('gymWorkoutDays', JSON.stringify(workoutDays));
                saveMusclesList();
                updateMuscleSelect();
                renderDays();
                const nextMuscle = allMuscles.find(m => !removedMuscles.includes(m));
                if (nextMuscle) document.getElementById('muscleSelect').value = nextMuscle;
                loadExercises();
            });
        };
        
        document.getElementById('cancelAddMuscleBtn').onclick = () => document.getElementById('addMuscleModal').classList.remove('active');
        
        // ============ EXERCISES TAB ============
        function loadExercises() {
            const availableMuscles = allMuscles.filter(m => !removedMuscles.includes(m));
            if (availableMuscles.length === 0) {
                document.getElementById('exercisesContainer').innerHTML = '<div style="text-align:center; color:var(--sec); padding:40px;">No muscle groups. Click "Add" to create one.</div>';
                return;
            }
            currentMuscle = document.getElementById('muscleSelect').value;
            if (!currentMuscle || removedMuscles.includes(currentMuscle)) {
                currentMuscle = availableMuscles[0];
                document.getElementById('muscleSelect').value = currentMuscle;
            }
            const container = document.getElementById('exercisesContainer');
            const exercises = exercisesDB[currentMuscle] || [];
            container.innerHTML = '';
            
            if (exercises.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--sec); padding:20px;">No exercises yet. Click "Add Exercise" below.</div>';
            }
            
            for (let i = 0; i < exercises.length; i++) {
                const ex = exercises[i];
                const div = document.createElement('div');
                div.className = 'exercise-row';
                div.innerHTML = `
                    <input type="text" class="exercise-name-input" value="${escapeHtml(ex.name)}" data-index="${i}" placeholder="Exercise name">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="sets-label">Sets:</span>
                        <input type="number" class="sets-input" value="${ex.sets || 3}" data-index="${i}" min="1" max="20" step="1">
                    </div>
                    <button class="remove-btn" data-index="${i}">🗑️</button>
                `;
                div.querySelector('.exercise-name-input').onchange = (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    exercisesDB[currentMuscle][idx].name = e.target.value;
                    saveExercises();
                    renderDays();
                };
                div.querySelector('.sets-input').onchange = (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    exercisesDB[currentMuscle][idx].sets = parseInt(e.target.value) || 3;
                    saveExercises();
                    renderDays();
                };
                div.querySelector('.remove-btn').onclick = (e) => {
                    const idx = parseInt(e.target.dataset.index);
                    exercisesDB[currentMuscle].splice(idx, 1);
                    saveExercises();
                    for (let day in workoutDays) {
                        if (workoutDays[day].exercises && workoutDays[day].exercises[currentMuscle]) {
                            workoutDays[day].exercises[currentMuscle] = workoutDays[day].exercises[currentMuscle].filter((_, i) => i !== idx);
                        }
                    }
                    localStorage.setItem('gymWorkoutDays', JSON.stringify(workoutDays));
                    loadExercises();
                    renderDays();
                };
                container.appendChild(div);
            }
            
            const addBtn = document.createElement('button');
            addBtn.className = 'add-exercise-btn';
            addBtn.innerHTML = '+ Add New Exercise';
            addBtn.onclick = () => {
                exercisesDB[currentMuscle].push({ name: 'New Exercise', sets: 3 });
                saveExercises();
                loadExercises();
            };
            container.appendChild(addBtn);
            
            if (exercisesSortable) exercisesSortable.destroy();
            exercisesSortable = new Sortable(container, {
                animation: 150,
                onEnd: () => {
                    const newOrder = [];
                    document.querySelectorAll('#exercisesContainer .exercise-row').forEach(row => {
                        const nameInput = row.querySelector('.exercise-name-input');
                        const setsInput = row.querySelector('.sets-input');
                        if (nameInput && setsInput) {
                            newOrder.push({ name: nameInput.value, sets: parseInt(setsInput.value) || 3 });
                        }
                    });
                    if (newOrder.length > 0) {
                        exercisesDB[currentMuscle] = newOrder;
                        saveExercises();
                        renderDays();
                    }
                }
            });
        }
        
        function saveExercises() { localStorage.setItem('gymExercises', JSON.stringify(exercisesDB)); }
        
        document.getElementById('saveExercisesBtn').onclick = () => {
            saveExercises();
            const btn = document.getElementById('saveExercisesBtn');
            btn.classList.add('save-animation');
            btn.innerHTML = '✓ Saved!';
            setTimeout(() => {
                btn.classList.remove('save-animation');
                btn.innerHTML = 'Save Exercises';
            }, 1500);
        };
        
        document.getElementById('muscleSelect').onchange = () => loadExercises();
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }
        
        // ============ DAYS TAB ============
        function renderDays() {
            const container = document.getElementById('daysContainer');
            container.innerHTML = '';
            
            for (let day of dayOrder) {
                const dayData = workoutDays[day];
                const isRest = !dayData.muscles || dayData.muscles.length === 0;
                const card = document.createElement('div');
                card.className = 'day-card';
                card.onclick = (e) => {
                    e.stopPropagation();
                    openMuscleSelector(day);
                };
                
                let musclesHtml = '';
                if (!isRest && dayData.muscles.length > 0) {
                    musclesHtml = '<div class="day-muscles">';
                    for (let m of dayData.muscles) {
                        if (!removedMuscles.includes(m)) {
                            musclesHtml += '<span class="muscle-tag">' + m + '</span>';
                        }
                    }
                    musclesHtml += '</div>';
                }
                
                let exercisesHtml = '<div class="day-exercises-preview">';
                let hasExercises = false;
                if (!isRest && dayData.muscles && dayData.muscles.length > 0) {
                    for (let muscle of dayData.muscles) {
                        if (removedMuscles.includes(muscle)) continue;
                        const exercises = dayData.exercises[muscle] || [];
                        for (let ex of exercises) {
                            hasExercises = true;
                            exercisesHtml += `<div class="day-exercise-preview"><div class="day-exercise-name">${escapeHtml(ex.name)}</div><div class="day-exercise-sets">${ex.sets || 3} sets</div></div>`;
                        }
                    }
                }
                if (!hasExercises && !isRest) exercisesHtml += '<div class="no-exercises-text">No exercises yet</div>';
                else if (isRest) exercisesHtml += '<div class="rest-badge">Rest Day</div>';
                exercisesHtml += '</div>';
                
                card.innerHTML = `
                    <div class="day-card-header">
                        <strong>${day}</strong>
                    </div>
                    ${musclesHtml}
                    ${exercisesHtml}
                `;
                container.appendChild(card);
            }
        }
        
        // ============ MUSCLE SELECTION (DIRECT - OPENS WHEN CLICKING DAY) ============
        let currentSelectedDay = null;
        let tempSelectedMuscles = [];
        
        function openMuscleSelector(day) {
            currentSelectedDay = day;
            const availableMuscles = allMuscles.filter(m => !removedMuscles.includes(m));
            const currentMuscles = (workoutDays[day]?.muscles || []).filter(m => !removedMuscles.includes(m));
            tempSelectedMuscles = [...currentMuscles];
            
            document.getElementById('muscleModalTitle').innerHTML = `Select muscles for ${day}`;
            const container = document.getElementById('muscleOptionsList');
            container.innerHTML = '';
            
            const restDiv = document.createElement('div');
            restDiv.className = 'muscle-option';
            restDiv.style.gridColumn = 'span 2';
            restDiv.innerHTML = `<input type="checkbox" id="restCheckbox" ${tempSelectedMuscles.length === 0 ? 'checked' : ''}><label class="rest-option">Rest Day (No muscles)</label>`;
            restDiv.querySelector('input').onchange = (e) => {
                if (e.target.checked) {
                    document.querySelectorAll('#muscleOptionsList .muscle-option input').forEach(ch => { if (ch.id !== 'restCheckbox') ch.checked = false; });
                    tempSelectedMuscles = [];
                }
            };
            container.appendChild(restDiv);
            
            for (let muscle of availableMuscles) {
                const div = document.createElement('div');
                div.className = 'muscle-option';
                div.innerHTML = `<input type="checkbox" value="${muscle}" ${tempSelectedMuscles.includes(muscle) ? 'checked' : ''}><label>${muscle}</label>`;
                div.querySelector('input').onchange = (e) => {
                    document.getElementById('restCheckbox').checked = false;
                    if (e.target.checked) {
                        if (!tempSelectedMuscles.includes(muscle)) tempSelectedMuscles.push(muscle);
                    } else {
                        const idx = tempSelectedMuscles.indexOf(muscle);
                        if (idx !== -1) tempSelectedMuscles.splice(idx, 1);
                    }
                };
                container.appendChild(div);
            }
            document.getElementById('muscleModal').classList.add('active');
        }
        
        function closeMuscleModal() { 
            document.getElementById('muscleModal').classList.remove('active'); 
        }
        
        function confirmMuscles() {
            if (currentSelectedDay) {
                const restCheck = document.getElementById('restCheckbox');
                if (restCheck?.checked) {
                    workoutDays[currentSelectedDay].muscles = [];
                    workoutDays[currentSelectedDay].exercises = {};
                } else {
                    workoutDays[currentSelectedDay].muscles = [...tempSelectedMuscles];
                    if (!workoutDays[currentSelectedDay].exercises) workoutDays[currentSelectedDay].exercises = {};
                    for (let muscle of tempSelectedMuscles) {
                        if (!workoutDays[currentSelectedDay].exercises[muscle]) {
                            workoutDays[currentSelectedDay].exercises[muscle] = JSON.parse(JSON.stringify(exercisesDB[muscle] || []));
                        }
                    }
                    for (let muscle in workoutDays[currentSelectedDay].exercises) {
                        if (!tempSelectedMuscles.includes(muscle)) delete workoutDays[currentSelectedDay].exercises[muscle];
                    }
                }
                localStorage.setItem('gymWorkoutDays', JSON.stringify(workoutDays));
                renderDays();
                closeMuscleModal();
                // After saving, show the exercises modal
                openDayModal(currentSelectedDay);
            }
        }
        
        document.getElementById('cancelMuscleBtn').onclick = closeMuscleModal;
        document.getElementById('confirmMuscleBtn').onclick = confirmMuscles;
        
        // ============ DAY MODAL (SHOWS EXERCISES) ==========
        function openDayModal(day) {
            const dayData = workoutDays[day];
            const container = document.getElementById('dayExercisesList');
            
            if (!dayData.muscles || dayData.muscles.length === 0 || dayData.muscles.filter(m => !removedMuscles.includes(m)).length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:40px;"><div style="margin-bottom:15px;">No muscle groups selected for ${day}.</div></div>`;
                document.getElementById('dayModalTitle').innerHTML = day;
                document.getElementById('dayModal').classList.add('active');
                return;
            }
            
            let html = '';
            const visibleMuscles = dayData.muscles.filter(m => !removedMuscles.includes(m));
            for (let muscle of visibleMuscles) {
                const exercises = dayData.exercises[muscle] || [];
                html += `<div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0 12px 0;">
                            <h4 style="color:var(--accent); font-size:1.1rem;">${muscle}</h4>
                            <div style="display: flex; gap: 8px;">
                                <button class="action-edit-btn" onclick="openExerciseSelector('${day}', '${muscle}')">Edit Exercises</button>
                                <button class="remove-muscle-btn" onclick="removeMuscleFromDay('${day}', '${muscle}')">Remove</button>
                            </div>
                         </div>`;
                if (exercises.length === 0) {
                    html += '<div class="day-exercise-item"><div class="day-exercise-info">No exercises added</div></div>';
                } else {
                    for (let i = 0; i < exercises.length; i++) {
                        const ex = exercises[i];
                        html += `<div class="day-exercise-item">
                                    <div class="day-exercise-info">
                                        <div class="day-exercise-name">${escapeHtml(ex.name)}</div>
                                        <div class="day-exercise-sets">${ex.sets || 3} sets</div>
                                    </div>
                                    <button class="remove-day-exercise" onclick="removeExerciseFromDay('${day}', '${muscle}', ${i})">✕</button>
                                </div>`;
                    }
                }
            }
            container.innerHTML = html;
            document.getElementById('dayModalTitle').innerHTML = day;
            document.getElementById('dayModal').classList.add('active');
        }
        
        function closeDayModal() { 
            document.getElementById('dayModal').classList.remove('active'); 
        }
        
        // Helper functions for day modal buttons
        window.removeExerciseFromDay = function(day, muscle, exIdx) {
            workoutDays[day].exercises[muscle].splice(exIdx, 1);
            localStorage.setItem('gymWorkoutDays', JSON.stringify(workoutDays));
            renderDays();
            openDayModal(day);
        };
        
        window.removeMuscleFromDay = function(day, muscle) {
            const idx = workoutDays[day].muscles.indexOf(muscle);
            if (idx !== -1) workoutDays[day].muscles.splice(idx, 1);
            delete workoutDays[day].exercises[muscle];
            localStorage.setItem('gymWorkoutDays', JSON.stringify(workoutDays));
            renderDays();
            openDayModal(day);
        };
        
        window.openExerciseSelector = function(day, muscle) {
            currentEditingDay = day;
            currentEditingMuscle = muscle;
            const currentExercises = workoutDays[day].exercises[muscle] || [];
            const allExercises = exercisesDB[muscle] || [];
            tempSelectedExercises = [...currentExercises];
            
            document.getElementById('exerciseModalTitle').innerHTML = `Select exercises for ${muscle} (${day})`;
            const container = document.getElementById('exercisesCheckboxList');
            container.innerHTML = '';
            for (let i = 0; i < allExercises.length; i++) {
                const ex = allExercises[i];
                const isChecked = tempSelectedExercises.some(e => e.name === ex.name);
                const div = document.createElement('div');
                div.className = 'exercise-checkbox-item';
                div.innerHTML = `<input type="checkbox" value="${i}" data-exercise-name="${escapeHtml(ex.name)}" ${isChecked ? 'checked' : ''}><label>${escapeHtml(ex.name)}</label><span style="font-size:0.7rem; color:var(--accent);">${ex.sets || 3} sets</span>`;
                div.querySelector('input').onchange = (e) => {
                    const exerciseName = e.target.dataset.exerciseName;
                    const exerciseObj = allExercises.find(ex => ex.name === exerciseName);
                    if (e.target.checked) {
                        if (!tempSelectedExercises.some(e => e.name === exerciseName)) {
                            tempSelectedExercises.push(exerciseObj ? {...exerciseObj} : { name: exerciseName, sets: 3 });
                        }
                    } else {
                        const idx = tempSelectedExercises.findIndex(e => e.name === exerciseName);
                        if (idx !== -1) tempSelectedExercises.splice(idx, 1);
                    }
                };
                container.appendChild(div);
            }
            if (allExercises.length === 0) container.innerHTML = '<div style="text-align:center; padding:30px;">No exercises created yet. Go to Workout Exercises tab to create some.</div>';
            document.getElementById('exerciseSelectModal').classList.add('active');
        };
        
        function closeExerciseSelector() { 
            document.getElementById('exerciseSelectModal').classList.remove('active'); 
        }
        
        function confirmExercises() {
            if (currentEditingDay && currentEditingMuscle) {
                workoutDays[currentEditingDay].exercises[currentEditingMuscle] = [...tempSelectedExercises];
                localStorage.setItem('gymWorkoutDays', JSON.stringify(workoutDays));
                renderDays();
                openDayModal(currentEditingDay);
            }
            closeExerciseSelector();
        }
        
        function selectAllExercises() {
            const allExercises = exercisesDB[currentEditingMuscle] || [];
            tempSelectedExercises = allExercises.map(ex => ({ ...ex }));
            document.querySelectorAll('#exercisesCheckboxList input').forEach(cb => cb.checked = true);
        }
        
        function deselectAllExercises() {
            tempSelectedExercises = [];
            document.querySelectorAll('#exercisesCheckboxList input').forEach(cb => cb.checked = false);
        }
        
        document.getElementById('selectAllExercisesBtn').onclick = selectAllExercises;
        document.getElementById('deselectAllExercisesBtn').onclick = deselectAllExercises;
        document.getElementById('cancelExerciseBtn').onclick = closeExerciseSelector;
        document.getElementById('confirmExerciseBtn').onclick = confirmExercises;
        document.getElementById('closeExerciseModalBtn').onclick = closeExerciseSelector;
        document.getElementById('closeDayModalBtn').onclick = closeDayModal;
        
        // Tab switching
        document.getElementById('exercisesTabBtn').onclick = () => {
            document.getElementById('exercisesTabBtn').classList.add('active');
            document.getElementById('daysTabBtn').classList.remove('active');
            document.getElementById('exercisesPanel').classList.add('active');
            document.getElementById('daysPanel').classList.remove('active');
            loadExercises();
        };
        
        document.getElementById('daysTabBtn').onclick = () => {
            document.getElementById('daysTabBtn').classList.add('active');
            document.getElementById('exercisesTabBtn').classList.remove('active');
