<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propfirms Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        .theme-white {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f8f8;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --border-color: #ddd;
        }

        .theme-darkblue {
            --bg-primary: #0a1929;
            --bg-secondary: #132f4c;
            --bg-card: #1a3a5c;
            --text-primary: #e0e0e0;
            --text-secondary: #8ab4d8;
            --border-color: #1e3a5f;
        }

        .theme-black {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        .theme-purple {
            --bg-primary: #1a0a2e;
            --bg-secondary: #2d1b4e;
            --bg-card: #3d2b5e;
            --text-primary: #e8d5f5;
            --text-secondary: #b794d4;
            --border-color: #4a2c7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-color);
            border-top: 4px solid #9c27b0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .back-btn:hover {
            background: var(--bg-card);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minwidth: 150px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .summary-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .summary-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s ease;
        }

        .summary-card:hover::before {
            left: 100%;
        }

        .summary-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .summary-card h3 {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #9c27b0;
        }

        .add-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            opacity: 0;
            animation: slideIn 0.6s ease forwards;
            animation-delay: 0.4s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .add-section h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
            font-size: 1.3rem;
            font-weight: 600;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 500;
        }

        input, select {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #9c27b0;
            box-shadow: 0 0 0 3px rgba(156, 39, 176, 0.15);
        }

        .submit-btn {
            background: linear-gradient(135deg, #9c27b0, #7b1fa2);
            color: #fff;
            border: none;
            padding: 16px 35px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(156, 39, 176, 0.4);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .accounts-section {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .accounts-section h2 {
            margin-bottom: 20px;
            color: var(--text-primary);
            font-size: 1.3rem;
            font-weight: 600;
        }

        .account-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 12px 22px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #9c27b0, #7b1fa2);
            color: #fff;
            border-color: #9c27b0;
            box-shadow: 0 5px 20px rgba(156, 39, 176, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: var(--bg-primary);
            transform: translateY(-2px);
        }

        /* Account Card - Active */
        .account-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .account-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            transition: width 0.3s ease;
        }

        .account-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .account-card:hover::before {
            width: 8px;
        }

        .account-card.active::before { background: linear-gradient(180deg, #2196f3, #1976d2); }
        .account-card.passed {
            background: linear-gradient(145deg, #0a2e0a, #0d1a0d);
            border-color: #00c853;
        }
        .account-card.passed::before { background: linear-gradient(180deg, #00c853, #009624); }
        .account-card.failed {
            background: linear-gradient(145deg, #2e0a0a, #1a0d0d);
            border-color: #ff5252;
        }
        .account-card.failed::before { background: linear-gradient(180deg, #ff5252, #c62828); }

        .account-card.completed {
            padding: 15px 20px;
        }

        .account-card.completed .account-card-header {
            margin-bottom: 8px;
        }

        .account-card.completed .account-name {
            font-size: 1rem;
        }

        .account-card.completed .account-info,
        .account-card.completed .progress-section,
        .account-card.completed .timer {
            display: none;
        }

        .account-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .account-name {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .account-status {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-active { background: linear-gradient(135deg, #1565c0, #1976d2); color: #fff; }
        .status-passed { background: linear-gradient(135deg, #00c853, #009624); color: #fff; }
        .status-failed { background: linear-gradient(135deg, #ff5252, #c62828); color: #fff; }

        .account-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .info-item h4 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .info-item p {
            color: var(--text-primary);
            font-size: 0.95rem;
        }

        .timer {
            background: var(--bg-secondary);
            padding: 12px 18px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 10px;
        }

        .timer-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            display: block;
        }

        .timer-value {
            color: #ff9800;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .progress-section {
            margin-top: 15px;
        }

        .progress-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.75rem;
            position: relative;
        }

        .progress-labels .neg-label { color: #ff5252; }
        .progress-labels .pos-label { color: #00c853; font-weight: 700; }

        .progress-bar {
            height: 24px;
            background: var(--bg-secondary);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .progress-fill {
            height: 100%;
            border-radius: 12px;
            transition: width 0.5s ease;
            position: absolute;
            left: 50%;
        }

        .progress-fill.positive { background: linear-gradient(90deg, #4caf50, #00c853); }
        .progress-fill.negative { background: linear-gradient(270deg, #ff5252, #f44336); }

        .progress-markers {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .progress-marker {
            position: absolute;
            top: 0;
            height: 100%;
            width: 1px;
            background: rgba(255,255,255,0.2);
        }

        .progress-marker.target {
            width: 3px;
            background: #00c853;
        }

        .progress-marker.breach {
            width: 3px;
            background: #ff5252;
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 4px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .account-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .action-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .action-btn.pass {
            background: linear-gradient(135deg, #00c853, #009624);
            border-color: #00c853;
            color: #fff;
        }

        .action-btn.pass:hover {
            box-shadow: 0 5px 20px rgba(0, 200, 83, 0.4);
        }

        .action-btn.fail {
            background: linear-gradient(135deg, #ff5252, #c62828);
            border-color: #ff5252;
            color: #fff;
        }

        .action-btn.fail:hover {
            box-shadow: 0 5px 20px rgba(255, 82, 82, 0.4);
        }

        .balance-input {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            width: 140px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .balance-input:focus {
            outline: none;
            border-color: #9c27b0;
        }

        /* Completed Account Compact */
        .completed-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .completed-info span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .reason-box {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
        }

        .reason-box h5 {
            color: #ff5252;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        .reason-box p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .no-accounts {
            text-align: center;
            color: var(--text-secondary);
            padding: 50px;
            font-style: italic;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            margin: 20px auto;
            animation: modalSlide 0.3s ease forwards;
        }

        @keyframes modalSlide {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal h2 {
            color: var(--text-primary);
            font-size: 1.2rem;
            font-weight: 600;
        }

        .close-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #ff5252;
            color: #fff;
            transform: rotate(90deg);
        }

        .modal form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 14px;
            border-radius: 10px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #9c27b0;
        }

        .confirm-btn {
            background: linear-gradient(135deg, #00c853, #009624);
            color: #fff;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 200, 83, 0.4);
        }

        .fail-btn {
            background: linear-gradient(135deg, #ff5252, #c62828);
        }

        .fail-btn:hover {
            box-shadow: 0 8px 25px rgba(255, 82, 82, 0.4);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .form-grid { grid-template-columns: 1fr; }
            .account-info { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loader-text">Loading Propfirms...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>💳 Propfirms Manager</h1>
            <a href="index.html" class="back-btn">← Back to Menu</a>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <h3>Total Accounts</h3>
                <div class="value" id="totalAccounts">0</div>
            </div>
            <div class="summary-card">
                <h3>Active</h3>
                <div class="value" style="color: #2196f3;" id="activeAccounts">0</div>
            </div>
            <div class="summary-card">
                <h3>Passed</h3>
                <div class="value" style="color: #00c853;" id="passedAccounts">0</div>
            </div>
            <div class="summary-card">
                <h3>Failed</h3>
                <div class="value" style="color: #ff5252;" id="failedAccounts">0</div>
            </div>
            <div class="summary-card">
                <h3>Total Invested</h3>
                <div class="value" id="totalInvested">$0</div>
            </div>
        </div>

        <div class="add-section">
            <h2>Add New Account</h2>
            <form id="addAccountForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="propfirmName">Propfirm Name</label>
                        <input type="text" id="propfirmName" list="propfirmList" required placeholder="Select or type name">
                        <datalist id="propfirmList">
                            <option value="FTMO">
                            <option value="Apex Trading">
                            <option value="Alpha Futures">
                            <option value="Tradeify">
                            <option value="Topstep">
                            <option value="Funded Next">
                            <option value="MFF">
                            <option value="Lucid Trading">
                        </datalist>
                    </div>
                    <div class="form-group">
                        <label for="accountType">Account Type</label>
                        <select id="accountType" required onchange="toggleDurationField()">
                            <option value="evaluation">Evaluation</option>
                            <option value="funded">Funded Account</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="accountSize">Account Size</label>
                        <select id="accountSize" required>
                            <option value="25000">$25,000</option>
                            <option value="50000">$50,000</option>
                            <option value="100000">$100,000</option>
                            <option value="200000">$200,000</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="pricePaid">Price Paid ($)</label>
                        <input type="number" id="pricePaid" step="0.01" required placeholder="e.g., 149.00">
                    </div>
                    <div class="form-group">
                        <label for="purchaseDate">Purchase Date</label>
                        <input type="date" id="purchaseDate" required>
                    </div>
                    <div class="form-group" id="durationGroup">
                        <label for="duration">Duration (Days)</label>
                        <input type="number" id="duration" value="30" placeholder="30">
                    </div>
                    <div class="form-group">
                        <label for="profitTarget">Profit Target (%)</label>
                        <input type="number" id="profitTarget" value="6" step="0.1" placeholder="6">
                    </div>
                    <div class="form-group">
                        <label for="maxDrawdown">Max Drawdown (%)</label>
                        <input type="number" id="maxDrawdown" value="4" step="0.1" placeholder="4">
                    </div>
                </div>
                <button type="submit" class="submit-btn">Add Account</button>
            </form>
        </div>

        <div class="accounts-section">
            <h2>Account History</h2>
            
            <div class="account-tabs">
                <button class="tab-btn active" onclick="filterAccounts('all')">All</button>
                <button class="tab-btn" onclick="filterAccounts('active')">Active</button>
                <button class="tab-btn" onclick="filterAccounts('passed')">Passed</button>
                <button class="tab-btn" onclick="filterAccounts('failed')">Failed</button>
                <button class="tab-btn" onclick="filterAccounts('evaluation')">Evaluations</button>
                <button class="tab-btn" onclick="filterAccounts('funded')">Funded</button>
            </div>

            <div id="accountsList"></div>
            <div class="no-accounts" id="noAccounts">No accounts added yet</div>
        </div>
    </div>

    <!-- Pass Modal -->
    <div class="modal-overlay" id="passModal">
        <div class="modal">
            <div class="modal-header">
                <h2>✅ Mark as Passed</h2>
                <button class="close-btn" onclick="closePassModal()">×</button>
            </div>
            <form id="passForm">
                <input type="hidden" id="passAccountId">
                <div class="form-group">
                    <label>Date Passed</label>
                    <input type="date" id="passDate" required>
                </div>
                <button type="submit" class="confirm-btn">Confirm Passed</button>
            </form>
        </div>
    </div>

    <!-- Fail Modal -->
    <div class="modal-overlay" id="failModal">
        <div class="modal">
            <div class="modal-header">
                <h2>❌ Mark as Failed</h2>
                <button class="close-btn" onclick="closeFailModal()">×</button>
            </div>
            <form id="failForm">
                <input type="hidden" id="failAccountId">
                <div class="form-group">
                    <label>Date Failed</label>
                    <input type="date" id="failDate" required>
                </div>
                <div class="form-group">
                    <label>Reason (What happened?)</label>
                    <textarea id="failReason" placeholder="e.g., Not following rules, bad streak, bad management, took bad trades..."></textarea>
                </div>
                <button type="submit" class="confirm-btn fail-btn">Confirm Failed</button>
            </form>
        </div>
    </div>

    <script>
        // Hide loading screen
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 500);
        });

        // Load theme
        const savedTheme = localStorage.getItem('theme') || 'black';
        document.body.className = 'theme-' + savedTheme;

        let accounts = JSON.parse(localStorage.getItem('propfirmAccounts')) || [];
        let propfirmNames = JSON.parse(localStorage.getItem('propfirmNames')) || 
            ['FTMO', 'Apex Trading', 'Alpha Futures', 'Tradeify', 'Topstep', 'Funded Next', 'MFF', 'Lucid Trading'];
        let currentFilter = 'all';
        document.getElementById('purchaseDate').valueAsDate = new Date();

        function toggleDurationField() {
            const type = document.getElementById('accountType').value;
            const durationGroup = document.getElementById('durationGroup');
            durationGroup.style.display = type === 'funded' ? 'none' : 'block';
        }

        document.getElementById('addAccountForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('propfirmName').value.trim();
            if (!propfirmNames.includes(name)) {
                propfirmNames.push(name);
                localStorage.setItem('propfirmNames', JSON.stringify(propfirmNames));
            }

            const size = parseInt(document.getElementById('accountSize').value);
            const profitTarget = parseFloat(document.getElementById('profitTarget').value);
            const maxDrawdown = parseFloat(document.getElementById('maxDrawdown').value);

            const account = {
                id: Date.now().toString(),
                name: name,
                type: document.getElementById('accountType').value,
                size: size,
                pricePaid: parseFloat(document.getElementById('pricePaid').value),
                purchaseDate: document.getElementById('purchaseDate').value,
                duration: document.getElementById('accountType').value === 'funded' ? null : parseInt(document.getElementById('duration').value || 30),
                profitTarget: profitTarget,
                maxDrawdown: maxDrawdown,
                status: 'active',
                balance: size,
                profit: 0,
                passedDate: null,
                failedDate: null,
                reason: null
            };

            accounts.push(account);
            saveAccounts();
            renderAccounts();
            updateStats();
            this.reset();
            document.getElementById('purchaseDate').valueAsDate = new Date();
            document.getElementById('duration').value = 30;
            document.getElementById('profitTarget').value = 6;
            document.getElementById('maxDrawdown').value = 4;
        });

        function updateBalance(id, newBalance) {
            const account = accounts.find(a => a.id === id);
            if (account) {
                account.balance = parseFloat(newBalance) || account.size;
                account.profit = account.balance - account.size;
                saveAccounts();
                renderAccounts();
            }
        }

        function openPassModal(id) {
            document.getElementById('passAccountId').value = id;
            document.getElementById('passDate').valueAsDate = new Date();
            document.getElementById('passModal').classList.add('active');
        }

        function closePassModal() {
            document.getElementById('passModal').classList.remove('active');
        }

        function openFailModal(id) {
            document.getElementById('failAccountId').value = id;
            document.getElementById('failDate').valueAsDate = new Date();
            document.getElementById('failModal').classList.add('active');
        }

        function closeFailModal() {
            document.getElementById('failModal').classList.remove('active');
        }

        document.getElementById('passForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('passAccountId').value;
            const date = document.getElementById('passDate').value;

            const account = accounts.find(a => a.id === id);
            if (account) {
                account.status = 'passed';
                account.passedDate = date;
                saveAccounts();
                renderAccounts();
                updateStats();
                closePassModal();
            }
        });

        document.getElementById('failForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('failAccountId').value;
            const date = document.getElementById('failDate').value;
            const reason = document.getElementById('failReason').value;

            const account = accounts.find(a => a.id === id);
            if (account) {
                account.status = 'failed';
                account.failedDate = date;
                account.reason = reason || 'No reason provided';
                saveAccounts();
                renderAccounts();
                updateStats();
                closeFailModal();
            }
        });

        function deleteAccount(id) {
            if (confirm('Are you sure you want to delete this account?')) {
                accounts = accounts.filter(a => a.id !== id);
                saveAccounts();
                renderAccounts();
                updateStats();
            }
        }

        function saveAccounts() {
            localStorage.setItem('propfirmAccounts', JSON.stringify(accounts));
        }

        function filterAccounts(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderAccounts();
        }

        function renderAccounts() {
            const container = document.getElementById('accountsList');
            container.innerHTML = '';

            let filtered = accounts;
            if (currentFilter === 'active') filtered = accounts.filter(a => a.status === 'active');
            else if (currentFilter === 'passed') filtered = accounts.filter(a => a.status === 'passed');
            else if (currentFilter === 'failed') filtered = accounts.filter(a => a.status === 'failed');
            else if (currentFilter === 'evaluation') filtered = accounts.filter(a => a.type === 'evaluation');
            else if (currentFilter === 'funded') filtered = accounts.filter(a => a.type === 'funded');

            document.getElementById('noAccounts').style.display = filtered.length === 0 ? 'block' : 'none';

            filtered.sort((a, b) => new Date(b.purchaseDate) - new Date(a.purchaseDate));

            filtered.forEach(account => {
                const daysLeft = calculateDaysLeft(account);
                const isCompleted = account.status === 'passed' || account.status === 'failed';
                
                const card = document.createElement('div');
                card.className = `account-card ${account.status} ${isCompleted ? 'completed' : ''}`;

                if (isCompleted) {
                    const statusColor = account.status === 'passed' ? '#00c853' : '#ff5252;
                    const dateField = account.status === 'passed' ? account.passedDate : account.failedDate;
                    
                    let html = `
                        <div class="account-card-header">
                            <div class="account-name">${account.name}</div>
                            <span class="account-status status-${account.status}">
                                ${account.status.charAt(0).toUpperCase() + account.status.slice(1)}
                            </span>
                        </div>
                        <div class="completed-info">
                            <span>💰 $${account.size.toLocaleString()}</span>
                            <span>📅 ${formatDate(account.purchaseDate)}</span>
                            <span style="color: ${statusColor}">${account.status === 'passed' ? '✅' : '❌'} ${formatDate(dateField)}</span>
                    `;
                    
                    if (account.status === 'failed' && account.reason) {
                        html += `
                            </div>
                            <div class="reason-box">
                                <h5>Why it failed</h5>
                                <p>${account.reason}</p>
                            </div>
                        `;
                    } else {
                        html += '</div>';
                    }
                    
                    html += `<div class="account-actions"><button class="action-btn" onclick="deleteAccount('${account.id}')">🗑 Delete</button></div>`;
                    
                    card.innerHTML = html;
                } else {
                    const profitPercent = ((account.profit / account.size) * 100).toFixed(2);
                    const isPositive = account.profit >= 0;
                    const progressWidth = 50 + (parseFloat(profitPercent) * (50 / Math.max(account.profitTarget, account.maxDrawdown)));

                    let html = `
                        <div class="account-card-header">
                            <div class="account-name">${account.name}</div>
                            <span class="account-status status-${account.status}">
                                ${account.status.charAt(0).toUpperCase() + account.status.slice(1)}
                            </span>
                        </div>
                        <div class="account-info">
                            <div class="info-item">
                                <h4>Account Type</h4>
                                <p>${account.type === 'evaluation' ? 'Evaluation' : 'Funded Account'}</p>
                            </div>
                            <div class="info-item">
                                <h4>Size</h4>
                                <p>$${account.size.toLocaleString()}</p>
                            </div>
                            <div class="info-item">
                                <h4>Price Paid</h4>
                                <p>$${account.pricePaid.toFixed(2)}</p>
                            </div>
                            <div class="info-item">
                                <h4>Purchase Date</h4>
                                <p>${formatDate(account.purchaseDate)}</p>
                            </div>
                    `;

                    if (account.type === 'evaluation' && daysLeft !== null) {
                        html += `
                            <div class="info-item">
                                <h4>Days Left</h4>
                                <p style="color: ${daysLeft > 7 ? '#ff9800' : '#ff5252'}">${daysLeft > 0 ? daysLeft : 'EXPIRED'}</p>
                            </div>
                        `;
                    }

                    html += '</div>';

                    if (account.type === 'evaluation' && daysLeft !== null) {
                        html += `
                            <div class="timer">
                                <span class="timer-label">Days Remaining</span>
                                <span class="timer-value">${daysLeft > 0 ? daysLeft : 0}</span>
                            </div>
                        `;
                    }

                    html += `
                        <div class="progress-section">
                            <div class="progress-labels">
                                <span class="neg-label">-${account.maxDrawdown}%</span>
                                <span style="color: var(--text-secondary)">1%</span>
                                <span style="color: var(--text-secondary)">2%</span>
                                <span style="color: var(--text-secondary)">3%</span>
                                <span style="color: var(--text-secondary)">4%</span>
                                <span style="color: var(--text-secondary)">5%</span>
                                <span class="pos-label">+${account.profitTarget}% 🎯</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill ${isPositive ? 'positive' : 'negative'}" 
                                     style="width: ${Math.min(100, Math.max(0, progressWidth))}%"></div>
                                <div class="progress-markers">
                                    <div class="progress-marker breach" style="left: ${50 - (account.maxDrawdown / 10) * 50}%"></div>
                                    <div class="progress-marker" style="left: 55%"></div>
                                    <div class="progress-marker" style="left: 60%"></div>
                                    <div class="progress-marker" style="left: 65%"></div>
                                    <div class="progress-marker" style="left: 70%"></div>
                                    <div class="progress-marker" style="left: 75%"></div>
                                    <div class="progress-marker target" style="left: ${50 + (account.profitTarget / 10) * 50}%"></div>
                                </div>
                                <span class="progress-text">${isPositive ? '+' : ''}$${account.profit.toFixed(0)}</span>
                            </div>
                        </div>
                        <div class="account-info" style="margin-top: 15px;">
                            <div class="info-item">
                                <h4>Current Balance</h4>
                                <p>
                                    <input type="number" class="balance-input" value="${account.balance}" 
                                           onchange="updateBalance('${account.id}', this.value)">
                                </p>
                            </div>
                            <div class="info-item">
                                <h4>Current P/L</h4>
                                <p style="color: ${isPositive ? '#00c853' : '#ff5252'}">
                                    ${isPositive ? '+' : ''}$${account.profit.toFixed(2)} (${isPositive ? '+' : ''}${profitPercent}%)
                                </p>
                            </div>
                        </div>
                    `;

                    html += `
                        <div class="account-actions">
                            <button class="action-btn pass" onclick="openPassModal('${account.id}')">✓ Mark Passed</button>
                            <button class="action-btn fail" onclick="openFailModal('${account.id}')">✗ Mark Failed</button>
                            <button class="action-btn" onclick="deleteAccount('${account.id}')">🗑 Delete</button>
                        </div>
                    `;

                    card.innerHTML = html;
                }

                container.appendChild(card);
            });
        }

        function calculateDaysLeft(account) {
            if (!account.duration) return null;
            const purchase = new Date(account.purchaseDate);
            const endDate = new Date(purchase.getTime() + account.duration * 24 * 60 * 60 * 1000);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const diff = Math.ceil((endDate - today) / (24 * 60 * 60 * 1000));
            return diff;
        }

        function updateStats() {
            const total = accounts.length;
            const active = accounts.filter(a => a.status === 'active').length;
            const passed = accounts.filter(a => a.status === 'passed').length;
            const failed = accounts.filter(a => a.status === 'failed').length;
            const invested = accounts.reduce((sum, a) => sum + a.pricePaid, 0);

            document.getElementById('totalAccounts').textContent = total;
            document.getElementById('activeAccounts').textContent = active;
            document.getElementById('passedAccounts').textContent = passed;
            document.getElementById('failedAccounts').textContent = failed;
            document.getElementById('totalInvested').textContent = '$' + invested.toFixed(2);
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        // Initialize
        renderAccounts();
        updateStats();
    </script>
</body>
</html>
