<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propfirms Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0d0d; --bg-secondary: #1a1a1a; --bg-card: #1e1e1e;
            --text-primary: #e0e0e0; --text-secondary: #888; --border-color: #333;
            --accent-blue: #2196f3; --accent-green: #00c853; --accent-red: #ff5252; --accent-warn: #ff9800;
            --gradient-blue: linear-gradient(135deg, #2196f3, #1976d2);
            --gradient-green: linear-gradient(135deg, #00c853, #009624);
            --gradient-red: linear-gradient(135deg, #ff5252, #d50000);
        }
        .theme-white { --bg-primary:#fff; --bg-secondary:#f8f8f8; --bg-card:#fff; --text-primary:#1a1a1a; --text-secondary:#555; --border-color:#ddd; }
        .theme-darkblue { --bg-primary:#0a1929; --bg-secondary:#132f4c; --bg-card:#1a3a5c; --text-primary:#e0e0e0; --text-secondary:#8ab4d8; --border-color:#1e3a5f; }
        .theme-purple { --bg-primary:#1a0a2e; --bg-secondary:#2d1b4e; --bg-card:#3d2b5e; --text-primary:#e8d5f5; --text-secondary:#b794d4; --border-color:#4a2c7a; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg-primary); color:var(--text-primary); min-height:100vh; padding:20px; transition:all 0.5s ease; }
        .loading-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-primary); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 0.5s ease, visibility 0.5s ease; }
        .loading-screen.hidden { opacity:0; visibility:hidden; }
        .loader { width:50px; height:50px; border:4px solid var(--border-color); border-top:4px solid var(--accent-blue); border-radius:50%; animation:spin 1s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .container { max-width:1200px; margin:0 auto; opacity:0; animation:fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { to { opacity:1; } }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; flex-wrap:wrap; gap:15px; }
        h1 { font-size:1.8rem; font-weight:700; display:flex; align-items:center; gap:10px; }
        .back-btn { background:var(--bg-secondary); color:var(--text-primary); text-decoration:none; padding:10px 20px; border-radius:8px; border:1px solid var(--border-color); transition:all 0.3s; }
        .back-btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.3); }
        .stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:15px; margin-bottom:25px; }
        .stat-card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:12px; padding:15px; text-align:center; transition:all 0.3s; }
        .stat-card:hover { transform:translateY(-3px); box-shadow:0 6px 20px rgba(0,0,0,0.25); }
        .stat-card h3 { color:var(--text-secondary); font-size:0.7rem; margin-bottom:6px; text-transform:uppercase; font-weight:600; }
        .stat-card .value { font-size:1.3rem; font-weight:700; }
        .stat-card.green .value { color:var(--accent-green); }
        .stat-card.red .value { color:var(--accent-red); }
        .form-card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:16px; padding:25px; margin-bottom:30px; }
        .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:15px; margin-top:15px; }
        .form-group { display:flex; flex-direction:column; gap:6px; }
        .form-group label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; }
        .form-group input, .form-group select { background:var(--bg-primary); border:1px solid var(--border-color); color:var(--text-primary); padding:10px; border-radius:8px; font-size:0.9rem; font-family:inherit; }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:var(--accent-blue); }
        .section-title { color:var(--accent-blue); font-size:0.85rem; margin:20px 0 10px; padding-bottom:5px; border-bottom:1px solid var(--border-color); font-weight:600; }
        .submit-btn { background:var(--gradient-blue); color:#fff; border:none; padding:14px; border-radius:10px; font-weight:600; cursor:pointer; width:100%; margin-top:20px; transition:all 0.3s; }
        .submit-btn:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(33,150,243,0.4); }
        .filters { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
        .filter-btn { background:var(--bg-secondary); border:1px solid var(--border-color); color:var(--text-secondary); padding:8px 16px; border-radius:8px; cursor:pointer; transition:all 0.2s; font-size:0.85rem; font-weight:500; }
        .filter-btn.active { background:var(--accent-blue); color:#fff; border-color:var(--accent-blue); }
        .accounts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:15px; }
        .account-card { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:14px; padding:20px; transition:all 0.3s; position:relative; overflow:hidden; }
        .account-card.failed { opacity:0.7; border-color:var(--accent-red); }
        .account-card:hover { transform:translateY(-3px); box-shadow:0 10px 25px rgba(0,0,0,0.3); }
        .acc-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .acc-name { font-size:1.15rem; font-weight:700; }
        .acc-status { padding:4px 10px; border-radius:6px; font-size:0.7rem; font-weight:600; text-transform:uppercase; }
        .status-active { background:rgba(33,150,243,0.15); color:var(--accent-blue); }
        .status-passed { background:rgba(0,200,83,0.15); color:var(--accent-green); }
        .status-failed { background:rgba(255,82,82,0.15); color:var(--accent-red); }
        .acc-details { display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:0.85rem; margin:12px 0; background:var(--bg-primary); padding:12px; border-radius:10px; }
        .acc-detail span { color:var(--text-secondary); display:block; font-size:0.65rem; text-transform:uppercase; margin-bottom:2px; }
        .acc-detail strong { font-weight:600; }
        .acc-actions { display:flex; gap:8px; margin-top:15px; }
        .action-btn { flex:1; padding:9px; border-radius:8px; border:1px solid var(--border-color); background:var(--bg-card); color:var(--text-primary); cursor:pointer; font-size:0.8rem; font-weight:500; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:5px; }
        .action-btn:hover { transform:translateY(-2px); }
        .action-btn.edit { border-color:var(--accent-warn); color:var(--accent-warn); }
        .action-btn.edit:hover { background:var(--accent-warn); color:#000; }
        .action-btn.pass { border-color:var(--accent-green); color:var(--accent-green); }
        .action-btn.pass:hover { background:var(--accent-green); color:#000; }
        .action-btn.fail { border-color:var(--accent-red); color:var(--accent-red); }
        .action-btn.fail:hover { background:var(--accent-red); color:#fff; }
        
        /* Modals */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1000; justify-content:center; align-items:center; padding:20px; backdrop-filter:blur(4px); }
        .modal-overlay.active { display:flex; }
        .modal { background:var(--bg-secondary); border:1px solid var(--border-color); border-radius:16px; padding:25px; max-width:500px; width:100%; animation:modalSlide 0.3s ease forwards; }
        @keyframes modalSlide { from { opacity:0; transform:translateY(-20px);} to { opacity:1; transform:translateY(0);} }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:15px; border-bottom:1px solid var(--border-color); }
        .modal h2 { font-size:1.2rem; font-weight:600; }
        .close-btn { background:var(--bg-card); border:1px solid var(--border-color); color:var(--text-primary); width:35px; height:35px; border-radius:50%; cursor:pointer; font-size:1.3rem; transition:all 0.3s; }
        .close-btn:hover { background:var(--accent-red); color:#fff; transform:rotate(90deg); }
        .modal-body .form-group { margin-bottom:15px; }
        .modal-footer { display:flex; gap:10px; margin-top:20px; }
        .modal-footer button { flex:1; padding:12px; border-radius:8px; font-weight:600; cursor:pointer; transition:all 0.2s; }
        .btn-cancel { background:var(--bg-card); border:1px solid var(--border-color); color:var(--text-secondary); }
        .btn-cancel:hover { background:var(--bg-primary); }
        .btn-confirm { background:var(--gradient-blue); border:none; color:#fff; }
        .btn-confirm.pass { background:var(--gradient-green); }
        .btn-confirm.fail { background:var(--gradient-red); }
        .btn-confirm:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.3); }
        
        @media(max-width:900px) { .stats-row { grid-template-columns:repeat(2,1fr); } }
        @media(max-width:600px) { .stats-row { grid-template-columns:1fr; } .form-grid { grid-template-columns:1fr; } .accounts-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div style="margin-top:15px;color:var(--text-secondary)">Loading Propfirms...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>💳 Propfirms Manager</h1>
            <a href="index.html" class="back-btn">← Menu</a>
        </div>

        <div class="stats-row">
            <div class="stat-card"><h3>Total Accounts</h3><div class="value" id="totalAcc">0</div></div>
            <div class="stat-card green"><h3>Active</h3><div class="value" id="activeAcc">0</div></div>
            <div class="stat-card green"><h3>Passed</h3><div class="value" id="passedAcc">0</div></div>
            <div class="stat-card red"><h3>Failed</h3><div class="value" id="failedAcc">0</div></div>
            <div class="stat-card"><h3>Total Invested</h3><div class="value" id="totalInvested">$0</div></div>
        </div>

        <div class="form-card">
            <h2 style="font-size:1.2rem;margin-bottom:15px;">Add New Account</h2>
            <div class="form-grid">
                <div class="form-group"><label>Propfirm Name</label><input type="text" id="accName" placeholder="e.g. FTMO, MyFundedFX"></div>
                <div class="form-group"><label>Account Type</label><select id="accType"><option>Evaluation</option><option>Funded Account</option></select></div>
                <div class="form-group"><label>Account Size</label><select id="accSize"><option value="25000">$25,000</option><option value="50000">$50,000</option><option value="100000">$100,000</option><option value="200000">$200,000</option></select></div>
                <div class="form-group"><label>Price Paid ($)</label><input type="number" id="accPrice" placeholder="e.g. 150"></div>
                <div class="form-group"><label>Purchase Date</label><input type="date" id="accDate"></div>
                <div class="form-group"><label>Duration (Days)</label><input type="number" id="accDuration" placeholder="e.g. 30"></div>
                <div class="form-group"><label>Profit Target (%)</label><input type="number" id="accTarget" placeholder="e.g. 10"></div>
                <div class="form-group"><label>Max Drawdown (%)</label><input type="number" id="accDD" placeholder="e.g. 10"></div>
            </div>
            <button class="submit-btn" onclick="addAccount()">Add Account</button>
        </div>

        <div class="form-card">
            <h2 style="font-size:1.2rem;margin-bottom:15px;">Account History</h2>
            <div class="filters">
                <button class="filter-btn active" onclick="filterAccounts('all')">All</button>
                <button class="filter-btn" onclick="filterAccounts('active')">Active</button>
                <button class="filter-btn" onclick="filterAccounts('passed')">Passed</button>
                <button class="filter-btn" onclick="filterAccounts('failed')">Failed</button>
                <button class="filter-btn" onclick="filterAccounts('evaluation')">Evaluations</button>
                <button class="filter-btn" onclick="filterAccounts('funded')">Funded</button>
            </div>
            <div class="accounts-grid" id="accountsGrid">
                <p style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:40px 0;">No accounts added yet.</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h2>✏️ Edit Account</h2>
                <button class="close-btn" onclick="closeModal('editModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>Current Balance ($)</label><input type="number" id="editBalance"></div>
                <div class="form-group"><label>Status</label><select id="editStatus"><option value="active">Active</option><option value="passed">Passed</option><option value="failed">Failed</option></select></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('editModal')">Cancel</button>
                <button class="btn-confirm" onclick="saveEdit()">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Pass Modal -->
    <div class="modal-overlay" id="passModal">
        <div class="modal">
            <div class="modal-header">
                <h2>✅ Mark as Passed</h2>
                <button class="close-btn" onclick="closeModal('passModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>Date Passed</label><input type="date" id="passDate"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('passModal')">Cancel</button>
                <button class="btn-confirm pass" onclick="confirmStatus('passed')">Confirm Passed</button>
            </div>
        </div>
    </div>

    <!-- Fail Modal -->
    <div class="modal-overlay" id="failModal">
        <div class="modal">
            <div class="modal-header">
                <h2>❌ Mark as Failed</h2>
                <button class="close-btn" onclick="closeModal('failModal')">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group"><label>Date Failed</label><input type="date" id="failDate"></div>
                <div class="form-group"><label>Reason (What happened?)</label><input type="text" id="failReason" placeholder="e.g. Hit daily drawdown, broke rules..."></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal('failModal')">Cancel</button>
                <button class="btn-confirm fail" onclick="confirmStatus('failed')">Confirm Failed</button>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => setTimeout(() => document.getElementById('loadingScreen').classList.add('hidden'), 500));
        const savedTheme = localStorage.getItem('theme') || 'black';
        document.body.className = 'theme-' + savedTheme;
        document.getElementById('accDate').valueAsDate = new Date();

        let accounts = JSON.parse(localStorage.getItem('propfirms')) || [];
        let currentFilter = 'all';
        let editingId = null;

        // AUTO-SYNC: Reads journal trades, updates balances, checks drawdown
        function syncAccounts() {
            const trades = JSON.parse(localStorage.getItem('trades')) || [];
            accounts.forEach(acc => {
                const accTrades = trades.filter(t => t.accountId === acc.id);
                const totalPL = accTrades.reduce((s, t) => s + parseFloat(t.profitLoss || 0), 0);
                const startBal = parseFloat(acc.size) || 0;
                let currentBal = startBal + totalPL;
                const maxDD = parseFloat(acc.maxDrawdown) || 0;
                const ddLimit = (maxDD / 100) * startBal;
                
                // Auto-fail if drawdown breached
                if (startBal - currentBal > ddLimit && acc.status === 'active') {
                    acc.status = 'failed';
                    acc.failDate = new Date().toISOString().split('T')[0];
                    acc.failReason = 'Auto-failed: Max drawdown exceeded';
                }
                acc.currentBalance = currentBal;
            });
            localStorage.setItem('propfirms', JSON.stringify(accounts));
            renderStats();
            renderAccounts();
        }

        function renderStats() {
            document.getElementById('totalAcc').textContent = accounts.length;
            document.getElementById('activeAcc').textContent = accounts.filter(a => a.status === 'active').length;
            document.getElementById('passedAcc').textContent = accounts.filter(a => a.status === 'passed').length;
            document.getElementById('failedAcc').textContent = accounts.filter(a => a.status === 'failed').length;
            document.getElementById('totalInvested').textContent = '$' + accounts.reduce((s, a) => s + (parseFloat(a.price) || 0), 0).toFixed(0);
        }

        function renderAccounts() {
            const grid = document.getElementById('accountsGrid');
            grid.innerHTML = '';
            let filtered = accounts;
            if (currentFilter === 'active') filtered = accounts.filter(a => a.status === 'active');
            else if (currentFilter === 'passed') filtered = accounts.filter(a => a.status === 'passed');
            else if (currentFilter === 'failed') filtered = accounts.filter(a => a.status === 'failed');
            else if (currentFilter === 'evaluation') filtered = accounts.filter(a => a.type === 'Evaluation');
            else if (currentFilter === 'funded') filtered = accounts.filter(a => a.type === 'Funded Account');

            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-secondary);padding:40px 0;">No accounts found.</p>';
                return;
            }

            filtered.forEach(acc => {
                const statusClass = acc.status === 'active' ? 'status-active' : (acc.status === 'passed' ? 'status-passed' : 'status-failed');
                const isActive = acc.status === 'active';
                const card = document.createElement('div');
                card.className = `account-card ${acc.status === 'failed' ? 'failed' : ''}`;
                card.innerHTML = `
                    <div class="acc-header">
                        <div class="acc-name">${acc.name}</div>
                        <span class="acc-status ${statusClass}">${acc.status}</span>
                    </div>
                    <div class="acc-details">
                        <div class="acc-detail"><span>Size</span><strong>$${parseInt(acc.size).toLocaleString()}</strong></div>
                        <div class="acc-detail"><span>Current</span><strong>$${(acc.currentBalance || acc.size).toLocaleString()}</strong></div>
                        <div class="acc-detail"><span>Drawdown</span><strong>${acc.maxDrawdown}%</strong></div>
                        <div class="acc-detail"><span>Target</span><strong>${acc.profitTarget}%</strong></div>
                        ${acc.passDate ? `<div class="acc-detail"><span>Passed</span><strong>${acc.passDate}</strong></div>` : ''}
                        ${acc.failDate ? `<div class="acc-detail"><span>Failed</span><strong>${acc.failDate}</strong></div>` : ''}
                    </div>
                    ${acc.failReason ? `<div style="font-size:0.8rem;color:var(--accent-red);margin-bottom:10px;background:rgba(255,82,82,0.1);padding:8px;border-radius:6px;">❌ ${acc.failReason}</div>` : ''}
                    <div class="acc-actions">
                        <button class="action-btn edit" onclick="openEditModal('${acc.id}')">✏️ Edit</button>
                        ${isActive ? `<button class="action-btn pass" onclick="openPassModal('${acc.id}')">✅ Pass</button>` : ''}
                        ${isActive ? `<button class="action-btn fail" onclick="openFailModal('${acc.id}')">❌ Fail</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function addAccount() {
            const acc = {
                id: Date.now().toString(),
                name: document.getElementById('accName').value,
                type: document.getElementById('accType').value,
                size: document.getElementById('accSize').value,
                price: document.getElementById('accPrice').value,
                purchaseDate: document.getElementById('accDate').value,
                duration: document.getElementById('accDuration').value,
                profitTarget: document.getElementById('accTarget').value,
                maxDrawdown: document.getElementById('accDD').value,
                status: 'active',
                currentBalance: parseFloat(document.getElementById('accSize').value)
            };
            if (!acc.name || !acc.price) { alert('Please fill in Propfirm Name and Price Paid.'); return; }
            accounts.push(acc);
            localStorage.setItem('propfirms', JSON.stringify(accounts));
            syncAccounts();
            ['accName','accPrice','accDuration','accTarget','accDD'].forEach(id => document.getElementById(id).value = '');
            alert('Account added successfully!');
        }

        function filterAccounts(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderAccounts();
        }

        // Edit Modal
        function openEditModal(id) {
            editingId = id;
            const acc = accounts.find(a => a.id === id);
            document.getElementById('editBalance').value = acc.currentBalance || acc.size;
            document.getElementById('editStatus').value = acc.status;
            document.getElementById('editModal').classList.add('active');
        }
        function saveEdit() {
            const acc = accounts.find(a => a.id === editingId);
            if (acc) {
                acc.currentBalance = parseFloat(document.getElementById('editBalance').value);
                acc.status = document.getElementById('editStatus').value;
                localStorage.setItem('propfirms', JSON.stringify(accounts));
                syncAccounts();
                closeModal('editModal');
            }
        }

        // Pass Modal
        function openPassModal(id) {
            editingId = id;
            document.getElementById('passDate').valueAsDate = new Date();
            document.getElementById('passModal').classList.add('active');
        }
        function confirmStatus(status) {
            const acc = accounts.find(a => a.id === editingId);
            if (!acc) return;
            acc.status = status;
            if (status === 'passed') acc.passDate = document.getElementById('passDate').value;
            if (status === 'failed') {
                acc.failDate = document.getElementById('failDate').value || new Date().toISOString().split('T')[0];
                acc.failReason = document.getElementById('failReason').value || 'Manually marked as failed';
            }
            localStorage.setItem('propfirms', JSON.stringify(accounts));
            syncAccounts();
            closeModal(status === 'passed' ? 'passModal' : 'failModal');
        }

        // Fail Modal
        function openFailModal(id) {
            editingId = id;
            document.getElementById('failDate').valueAsDate = new Date();
            document.getElementById('failReason').value = '';
            document.getElementById('failModal').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
            editingId = null;
        }

        // Close modals on overlay click
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', e => { if(e.target === overlay) closeModal(overlay.id); });
        });

        // Initial load & sync
        syncAccounts();
    </script>
</body>
</html>
