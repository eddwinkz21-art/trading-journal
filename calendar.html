<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: #333;
            color: #e0e0e0;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: background 0.3s;
            font-size: 0.95rem;
        }

        .back-btn:hover { background: #444; }

        .forex-btn {
            background: #c62828;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: background 0.3s;
        }

        .forex-btn:hover { background: #b71c1c; }

        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: #2196f3;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: background 0.3s;
        }

        .nav-btn:hover { background: #1976d2; }

        .month-year {
            font-size: 1.6rem;
            font-weight: 600;
            min-width: 220px;
            text-align: center;
        }

        .day-summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .summary-card {
            background: linear-gradient(145deg, #1a1a1a, #242424);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 18px;
            flex: 1;
            min-width: 130px;
            text-align: center;
        }

        .summary-card h3 {
            color: #888;
            font-size: 0.75rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .summary-card .value { font-size: 1.4rem; font-weight: 700; }
        .summary-card.profit .value { color: #00c853; }
        .summary-card.loss .value { color: #ff5252; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-header {
            text-align: center;
            padding: 12px 5px;
            color: #888;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .day-cell {
            background: linear-gradient(145deg, #1a1a1a, #1e1e1e);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 8px;
            min-height: 90px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .day-cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .day-cell.today {
            border: 2px solid #2196f3;
        }

        .day-cell.profit-day {
            background: linear-gradient(145deg, #0a2e0a, #0d1a0d);
            border-color: #00c853;
        }

        .day-cell.loss-day {
            background: linear-gradient(145deg, #2e0a0a, #1a0d0d);
            border-color: #ff5252;
        }

        .day-cell.other-month {
            opacity: 0.2;
            pointer-events: none;
        }

        .day-number {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .day-cell.profit-day .day-number { color: #00c853; }
        .day-cell.loss-day .day-number { color: #ff5252; }

        .day-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .day-profit {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .day-profit.positive { color: #00c853; }
        .day-profit.negative { color: #ff5252; }

        .day-trades-count {
            font-size: 0.7rem;
            color: #888;
        }

        .day-news {
            font-size: 0.65rem;
            color: #fff;
            background: #c62828;
            padding: 2px 5px;
            border-radius: 4px;
            margin-top: auto;
            text-align: center;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #888;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-profit { background: linear-gradient(145deg, #0a2e0a, #0d1a0d); border: 1px solid #00c853; }
        .legend-loss { background: linear-gradient(145deg, #2e0a0a, #1a0d0d); border: 1px solid #ff5252; }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 25px;
            max-width: 900px;
            width: 100%;
            margin: 20px auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #333;
        }

        .modal h2 {
            color: #fff;
            font-size: 1.3rem;
        }

        .close-btn {
            background: #333;
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
        }

        .close-btn:hover { background: #444; }

        .section-title {
            color: #2196f3;
            font-size: 0.9rem;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }

        .trade-card {
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .trade-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .trade-card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .trade-card-pl {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .trade-card-pl.positive { color: #00c853; }
        .trade-card-pl.negative { color: #ff5252; }

        .trade-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .trade-card-item {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
        }

        .trade-card-item h5 {
            color: #888;
            font-size: 0.7rem;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .trade-card-item p {
            color: #e0e0e0;
            font-size: 0.9rem;
        }

        .tier-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .tier-aplus { background: #ffd700; color: #000; }
        .tier-a { background: #c0c0c0; color: #000; }
        .tier-b { background: #cd7f32; color: #000; }

        .session-tag {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .session-London { background: #1a237e; color: #fff; }
        .session-Asia { background: #b71c1c; color: #fff; }
        .session-NewYork { background: #1b5e20; color: #fff; }

        .trade-card-notes {
            margin-top: 12px;
        }

        .trade-card-notes h5 {
            color: #888;
            font-size: 0.75rem;
            margin-bottom: 5px;
        }

        .trade-card-notes p {
            color: #aaa;
            font-size: 0.85rem;
            white-space: pre-wrap;
        }

        .trade-card-images {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .trade-card-images img {
            max-width: 150px;
            max-height: 100px;
            border-radius: 8px;
            cursor: pointer;
        }

        .news-item {
            background: rgba(198, 40, 40, 0.1);
            border-left: 3px solid #c62828;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-item h4 {
            color: #fff;
            font-size: 0.95rem;
        }

        .news-item p {
            color: #888;
            font-size: 0.8rem;
        }

        .delete-news-btn {
            background: #333;
            border: none;
            color: #888;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .delete-news-btn:hover {
            background: #ff5252;
            color: #fff;
        }

        .add-news-form {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .add-news-form input {
            flex: 1;
            min-width: 150px;
            background: #0d0d0d;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 10px;
            border-radius: 8px;
        }

        .add-news-form button {
            background: #c62828;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }

        .add-news-form button:hover { background: #b71c1c; }

        .no-content {
            color: #666;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.4rem; }
            .calendar-grid { gap: 4px; }
            .day-cell { min-height: 65px; padding: 8px 4px; }
            .day-header { font-size: 0.7rem; padding: 8px 2px; }
            .day-profit { font-size: 0.75rem; }
            .modal { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Trading Calendar</h1>
            <div class="nav-buttons">
                <a href="https://www.forexfactory.com/calendar" target="_blank" class="forex-btn">
                    📰 Forex Factory
                </a>
                <a href="index.html" class="back-btn">← Menu</a>
            </div>
        </div>

        <div class="calendar-nav">
            <button class="nav-btn" onclick="previousMonth()">←</button>
            <div class="month-year" id="monthYear">January 2025</div>
            <button class="nav-btn" onclick="nextMonth()">→</button>
        </div>

        <div class="day-summary">
            <div class="summary-card">
                <h3>Trades</h3>
                <div class="value" id="monthTrades">0</div>
            </div>
            <div class="summary-card profit" id="plCard">
                <h3>Month P/L</h3>
                <div class="value" id="monthPL">$0.00</div>
            </div>
            <div class="summary-card">
                <h3>Win Rate</h3>
                <div class="value" id="monthWinRate">0%</div>
            </div>
            <div class="summary-card">
                <h3>Red News</h3>
                <div class="value" id="monthNews">0</div>
            </div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="day-header">Sun</div>
            <div class="day-header">Mon</div>
            <div class="day-header">Tue</div>
            <div class="day-header">Wed</div>
            <div class="day-header">Thu</div>
            <div class="day-header">Fri</div>
            <div class="day-header">Sat</div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-color legend-profit"></div>
                <span>Profitable Day</span>
            </div>
            <div class="legend-item">
                <div class="legend-color legend-loss"></div>
                <span>Loss Day</span>
            </div>
        </div>
    </div>

    <!-- Day Detail Modal -->
    <div class="modal-overlay" id="dayModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalDate">January 1, 2025</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let newsEvents = JSON.parse(localStorage.getItem('newsEvents')) || [];
        let currentDate = new Date();
        let selectedDate = null;

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"];
            
            document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            const calendarGrid = document.getElementById('calendarGrid');
            const dayHeaders = calendarGrid.querySelectorAll('.day-header');
            calendarGrid.innerHTML = '';
            dayHeaders.forEach(header => calendarGrid.appendChild(header.cloneNode(true)));
            
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell other-month';
                calendarGrid.appendChild(emptyCell);
            }
            
            let monthTrades = 0;
            let monthPL = 0;
            let monthWins = 0;
            let monthNewsCount = 0;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                const dayTrades = trades.filter(t => t.date === dateStr);
                const dayNews = newsEvents.filter(n => n.date === dateStr);
                const dayPL = dayTrades.reduce((sum, t) => sum + t.profitLoss, 0);
                
                monthTrades += dayTrades.length;
                monthPL += dayPL;
                monthWins += dayTrades.filter(t => t.profitLoss > 0).length;
                monthNewsCount += dayNews.length;
                
                // Determine cell class based on P/L
                if (dayTrades.length > 0) {
                    cell.className = dayPL >= 0 ? 'day-cell profit-day' : 'day-cell loss-day';
                } else {
                    cell.className = 'day-cell';
                }
                
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    cell.classList.add('today');
                }
                
                const profitClass = dayPL >= 0 ? 'positive' : 'negative';
                const sign = dayPL >= 0 ? '+' : '';
                
                let content = `<div class="day-number">${day}</div><div class="day-content">`;
                
                if (dayTrades.length > 0) {
                    content += `
                        <div class="day-profit ${profitClass}">${sign}$${dayPL.toFixed(0)}</div>
                        <div class="day-trades-count">${dayTrades.length} trade${dayTrades.length > 1 ? 's' : ''}</div>
                    `;
                }
                
                if (dayNews.length > 0) {
                    content += `<div class="day-news">${dayNews.length} news</div>`;
                }
                
                content += '</div>';
                cell.innerHTML = content;
                cell.onclick = () => openDayModal(dateStr);
                
                calendarGrid.appendChild(cell);
            }
            
            // Update summary
            document.getElementById('monthTrades').textContent = monthTrades;
            const plSign = monthPL >= 0 ? '+' : '';
            document.getElementById('monthPL').textContent = `${plSign}$${monthPL.toFixed(2)}`;
            
            const plCard = document.getElementById('plCard');
            plCard.classList.remove('profit', 'loss');
            plCard.classList.add(monthPL >= 0 ? 'profit' : 'loss');
            
            document.getElementById('monthWinRate').textContent = monthTrades > 0 
                ? `${((monthWins / monthTrades) * 100).toFixed(0)}%` 
                : '0%';
            document.getElementById('monthNews').textContent = monthNewsCount;
        }

        function openDayModal(dateStr) {
            selectedDate = dateStr;
            const date = new Date(dateStr);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('modalDate').textContent = date.toLocaleDateString('en-US', options);
            
            const dayTrades = trades.filter(t => t.date === dateStr);
            const dayNews = newsEvents.filter(n => n.date === dateStr);
            
            let content = '';
            
            // News section
            content += '<p class="section-title">📰 Red Impact USD News</p>';
            if (dayNews.length > 0) {
                dayNews.forEach(news => {
                    content += `
                        <div class="news-item">
                            <div>
                                <h4>${news.title}</h4>
                                ${news.time ? `<p>${news.time}</p>` : ''}
                            </div>
                            <button class="delete-news-btn" onclick="deleteNews('${news.id}')">Delete</button>
                        </div>
                    `;
                });
            } else {
                content += '<p class="no-content">No red impact news added</p>';
            }
            
            // Add news form
            content += `
                <div class="add-news-form">
                    <input type="text" id="newsTitle" placeholder="News title (e.g., NFP, FOMC)">
                    <input type="text" id="newsTime" placeholder="Time (optional)">
                    <button onclick="addNews()">+ Add News</button>
                </div>
            `;
            
            // Trades section
            content += '<p class="section-title">📊 Trades</p>';
            if (dayTrades.length > 0) {
                dayTrades.forEach(trade => {
                    const plSign = trade.profitLoss >= 0 ? '+' : '';
                    const plClass = trade.profitLoss >= 0 ? 'positive' : 'negative';
                    const tierClass = trade.tier === 'A+' ? 'tier-aplus' : (trade.tier === 'A' ? 'tier-a' : 'tier-b');
                    const sessionClass = `session-${trade.session.replace(' ', '')}`;
                    
                    content += `
                        <div class="trade-card">
                            <div class="trade-card-header">
                                <div class="trade-card-title">
                                    ${trade.symbol} <span class="tier-badge ${tierClass}">Tier ${trade.tier}</span> 
                                    <span class="session-tag ${sessionClass}">${trade.session}</span>
                                </div>
                                <div class="trade-card-pl ${plClass}">${plSign}$${trade.profitLoss.toFixed(2)}</div>
                            </div>
                            <div class="trade-card-grid">
                                <div class="trade-card-item">
                                    <h5>Type</h5>
                                    <p>${trade.type}</p>
                                </div>
                                <div class="trade-card-item">
                                    <h5>Time</h5>
                                    <p>${trade.tradeHour || '-'} ${trade.timezone || ''}</p>
                                </div>
                                <div class="trade-card-item">
                                    <h5>Duration</h5>
                                    <p>${trade.duration || '-'}</p>
                                </div>
                                <div class="trade-card-item">
                                    <h5>R:R</h5>
                                    <p>${trade.rr || '-'}</p>
                                </div>
                            </div>
                            <div class="trade-card-notes">
                                <h5>Confirmations</h5>
                                <p>${trade.confirmations || '-'}</p>
                            </div>
                            <div class="trade-card-notes">
                                <h5>Improvement</h5>
                                <p>${trade.improvement || '-'}</p>
                            </div>
                    `;
                    
                    if (trade.tradeImage || trade.proofImage) {
                        content += '<div class="trade-card-images">';
                        if (trade.tradeImage) {
                            content += `<img src="${trade.tradeImage}" alt="Setup" onclick="window.open('${trade.tradeImage}', '_blank')">`;
                        }
                        if (trade.proofImage) {
                            content += `<img src="${trade.proofImage}" alt="Proof" onclick="window.open('${trade.proofImage}', '_blank')">`;
                        }
                        content += '</div>';
                    }
                    
                    content += '</div>';
                });
            } else {
                content += '<p class="no-content">No trades on this day</p>';
            }
            
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('dayModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
        }

        function addNews() {
            const title = document.getElementById('newsTitle').value.trim();
            const time = document.getElementById('newsTime').value.trim();
            
            if (!title) {
                alert('Please enter a news title');
                return;
            }
            
            const news = {
                id: Date.now().toString(),
                date: selectedDate,
                title: title,
                time: time
            };
            
            newsEvents.push(news);
            localStorage.setItem('newsEvents', JSON.stringify(newsEvents));
            
            openDayModal(selectedDate);
            renderCalendar();
        }

        function deleteNews(id) {
            newsEvents = newsEvents.filter(n => n.id !== id);
            localStorage.setItem('newsEvents', JSON.stringify(newsEvents));
            openDayModal(selectedDate);
            renderCalendar();
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        document.getElementById('dayModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        renderCalendar();
    </script>
</body>
</html>
