<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calendar</title>
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-color);
            border-top: 4px solid #2196f3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--bg-card);
            transform: translateY(-2px);
        }

        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: linear-gradient(135deg, #2196f3, #1976d2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: scale(1.1);
        }

        .month-year {
            font-size: 1.6rem;
            font-weight: 700;
            min-width: 220px;
            text-align: center;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .stat-card .value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .stat-card.profit .value { color: #00c853; }
        .stat-card.loss .value { color: #ff5252; }

        .winrate-card {
            grid-column: span 2;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .winrate-card h3 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .donut-container {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .donut-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 700;
        }

        .avg-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
        }

        .avg-card h3 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .avg-bar {
            display: flex;
            height: 35px;
            border-radius: 18px;
            overflow: hidden;
            background: var(--bg-primary);
        }

        .avg-wins, .avg-losses {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.5s ease;
        }

        .avg-wins { background: linear-gradient(90deg, #00c853, #00e676); color: #000; }
        .avg-losses { background: linear-gradient(90deg, #ff5252, #ff1744); color: #fff; }

        .avg-values {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.8rem;
        }

        .avg-values .win { color: #00c853; font-weight: 600; }
        .avg-values .loss { color: #ff5252; font-weight: 600; }

        /* Calendar */
        .calendar-wrapper {
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .calendar-main { flex: 1; min-width: 700px; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-header {
            text-align: center;
            padding: 12px 5px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .day-header.weekend { color: #ff5252; }

        .day-cell {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 6px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .day-cell:hover:not(.weekend):not(.other-month) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: #2196f3;
        }

        .day-cell.today {
            border: 2px solid #2196f3;
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.3);
        }

        .day-cell.profit-day {
            background: linear-gradient(145deg, #0a2e0a, #0d1a0d);
            border-color: #00c853;
        }

        .day-cell.loss-day {
            background: linear-gradient(145deg, #2e0a0a, #1a0d0d);
            border-color: #ff5252;
        }

        .day-cell.weekend {
            background: linear-gradient(145deg, #1a1a1a, #1a1a1a);
            border-color: #2a2a2a;
            opacity: 0.5;
            cursor: not-allowed;
        }

        .day-cell.other-month {
            opacity: 0.15;
            pointer-events: none;
        }

        .day-number {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .day-cell.profit-day .day-number { color: #00c853; }
        .day-cell.loss-day .day-number { color: #ff5252; }

        .day-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .day-profit {
            font-size: 0.8rem;
            font-weight: 700;
        }

        .day-profit.positive { color: #00c853; }
        .day-profit.negative { color: #ff5252; }

        .day-trades-count {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .day-news {
            font-size: 0.65rem;
            color: #fff;
            background: linear-gradient(135deg, #c62828, #b71c1c);
            padding: 3px 5px;
            border-radius: 4px;
            margin-top: 3px;
            text-align: center;
            font-weight: 600;
            line-height: 1.3;
        }

        .day-news.holiday {
            background: linear-gradient(135deg, #7b1fa2, #4a148c);
        }

        .day-news.high-impact {
            background: linear-gradient(135deg, #d32f2f, #b71c1c);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .weekend-label {
            font-size: 0.6rem;
            color: #ff5252;
            text-align: center;
            margin-top: auto;
        }

        /* Weekly Sidebar */
        .weekly-sidebar {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 90px;
        }

        .weekly-header {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .weekly-total-card {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .weekly-total-card h4 {
            color: var(--text-secondary);
            font-size: 0.65rem;
            margin-bottom: 4px;
        }

        .weekly-total-card .amount {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .weekly-total-card .amount.positive { color: #00c853; }
        .weekly-total-card .amount.negative { color: #ff5252; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            margin: 20px auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .close-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .close-btn:hover { 
            background: #ff5252; 
            color: #fff;
            transform: rotate(90deg);
        }

        .section-title {
            color: #2196f3;
            font-size: 0.9rem;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .news-item {
            background: rgba(198, 40, 40, 0.1);
            border-left: 3px solid #c62828;
            padding: 14px;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
        }

        .news-item h4 {
            color: var(--text-primary);
            font-size: 0.95rem;
            margin-bottom: 5px;
        }

        .news-item p {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .news-badge {
            background: linear-gradient(135deg, #c62828, #b71c1c);
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
            margin-left: 10px;
        }

        .trade-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
        }

        .trade-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .trade-card-title { font-size: 1.1rem; font-weight: 600; }
        .trade-card-pl { font-size: 1.2rem; font-weight: 700; }
        .trade-card-pl.positive { color: #00c853; }
        .trade-card-pl.negative { color: #ff5252; }

        .no-content {
            color: #666;
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .weekend-modal {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }

        .weekend-modal h3 {
            color: #ff5252;
            margin-bottom: 12px;
            font-size: 1.3rem;
        }

        @media (max-width: 900px) {
            .stats-row {
                grid-template-columns: 1fr 1fr;
            }
            .winrate-card {
                grid-column: span 2;
            }
            .calendar-wrapper { flex-direction: column; }
            .calendar-main { min-width: 100%; }
        }

        @media (max-width: 600px) {
            .stats-row {
                grid-template-columns: 1fr;
            }
            .winrate-card {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div style="margin-top: 20px; color: var(--text-secondary);">Loading Calendar & Economic Data...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📅 Trading Calendar</h1>
            <a href="index.html" class="back-btn">← Menu</a>
        </div>

        <div class="calendar-nav">
            <button class="nav-btn" onclick="previousMonth()">←</button>
            <div class="month-year" id="monthYear">January 2025</div>
            <button class="nav-btn" onclick="nextMonth()">→</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <h3>Total Trades</h3>
                <div class="value" id="totalTrades">0</div>
            </div>
            <div class="stat-card">
                <h3>Avg RR</h3>
                <div class="value" id="avgRR">-</div>
            </div>
            <div class="stat-card profit" id="plCard">
                <h3>Month P/L</h3>
                <div class="value" id="monthPL">$0.00</div>
            </div>
            <div class="winrate-card">
                <h3>Win Rate</h3>
                <div class="donut-container">
                    <canvas id="donutChart" width="80" height="80"></canvas>
                    <div class="donut-text" id="winRateText">0%</div>
                </div>
            </div>
            <div class="avg-card">
                <h3>Avg Win / Loss</h3>
                <div class="avg-bar">
                    <div class="avg-wins" id="avgWinsBar" style="width: 50%;">$0</div>
                    <div class="avg-losses" id="avgLossesBar" style="width: 50%;">$0</div>
                </div>
                <div class="avg-values">
                    <span class="win">Win: $<span id="avgWin">0</span></span>
                    <span class="loss">Loss: $<span id="avgLoss">0</span></span>
                </div>
            </div>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-main">
                <div class="calendar-grid" id="calendarGrid">
                    <div class="day-header weekend">Sun</div>
                    <div class="day-header">Mon</div>
                    <div class="day-header">Tue</div>
                    <div class="day-header">Wed</div>
                    <div class="day-header">Thu</div>
                    <div class="day-header">Fri</div>
                    <div class="day-header weekend">Sat</div>
                </div>
            </div>
            <div class="weekly-sidebar" id="weeklySidebar">
                <div class="weekly-header">Weekly</div>
            </div>
        </div>

        <div style="margin-top: 25px; text-align: center; color: var(--text-secondary); font-size: 0.85rem;">
            <span style="display: inline-block; margin: 0 10px;">🔴 High Impact News</span>
            <span style="display: inline-block; margin: 0 10px;">🟣 Bank Holidays</span>
            <span style="display: inline-block; margin: 0 10px;">🟢 Profit Day</span>
            <span style="display: inline-block; margin: 0 10px;">🔴 Loss Day</span>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="dayModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalDate">January 1, 2025</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <script>
        // Hide loading screen
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 800);
        });

        // Load trades from localStorage
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let economicEvents = [];
        let currentDate = new Date();
        let selectedDate = null;

        // US Bank Holidays 2025
        const usHolidays2025 = [
            { date: '2025-01-01', name: "New Year's Day" },
            { date: '2025-01-20', name: 'Martin Luther King Jr. Day' },
            { date: '2025-02-17', name: "Presidents' Day" },
            { date: '2025-04-18', name: 'Good Friday' },
            { date: '2025-05-26', name: 'Memorial Day' },
            { date: '2025-06-19', name: 'Juneteenth' },
            { date: '2025-07-04', name: 'Independence Day' },
            { date: '2025-09-01', name: 'Labor Day' },
            { date: '2025-11-27', name: 'Thanksgiving' },
            { date: '2025-12-25', name: 'Christmas' }
        ];

        // Fetch economic calendar from Finnhub
        async function fetchEconomicData() {
            try {
                // Try Finnhub API
                const response = await fetch('https://finnhub.io/api/v1/calendar/economic?token=d7jlf11r01qhf13fal30d7jlf11r01qhf13fal3g');
                const data = await response.json();
                
                if (data.economicCalendar) {
                    // Filter for HIGH impact USD events only
                    economicEvents = data.economicCalendar
                        .filter(event => {
                            const isUSD = event.country === 'US' || event.currency === 'USD';
                            const isHighImpact = event.impact === 'High' || event.importance === 3;
                            return isUSD && isHighImpact;
                        })
                        .map(event => ({
                            date: event.date,
                            time: event.time || 'TBA',
                            name: event.event || event.title,
                            impact: 'High',
                            type: 'economic',
                            currency: 'USD'
                        }));
                    
                    console.log(`✅ Loaded ${economicEvents.length} high impact USD events`);
                }
            } catch (error) {
                console.log('⚠️ Using cached economic data');
                economicEvents = JSON.parse(localStorage.getItem('economicEvents')) || [];
            }
            
            // Add holidays
            usHolidays2025.forEach(holiday => {
                economicEvents.push({
                    date: holiday.date,
                    time: 'All Day',
                    name: holiday.name + ' (Market Closed)',
                    impact: 'Holiday',
                    type: 'holiday'
                });
            });
            
            // Sort by date
            economicEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            // Cache it
            localStorage.setItem('economicEvents', JSON.stringify(economicEvents));
            
            renderCalendar();
        }

        // Fetch on load
        fetchEconomicData();

        function drawDonut(winPercent) {
            const canvas = document.getElementById('donutChart');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 35;
            const lineWidth = 12;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = lineWidth;
            ctx.stroke();
            
            // Win percentage arc
            if (winPercent > 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, -Math.PI / 2, -Math.PI / 2 + (2 * Math.PI * winPercent / 100));
                ctx.strokeStyle = '#00c853';
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            
            document.getElementById('winRateText').textContent = winPercent.toFixed(0) + '%';
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"];
            
            document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            const calendarGrid = document.getElementById('calendarGrid');
            const dayHeaders = calendarGrid.querySelectorAll('.day-header');
            calendarGrid.innerHTML = '';
            dayHeaders.forEach(header => calendarGrid.appendChild(header.cloneNode(true)));
            
            // Empty cells for days before month starts
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell other-month';
                calendarGrid.appendChild(emptyCell);
            }
            
            let monthTrades = 0;
            let monthPL = 0;
            let monthWins = 0;
            let monthLosses = 0;
            let totalWinAmount = 0;
            let totalLossAmount = 0;
            let rrWins = [];
            let weeklyData = {};
            
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month, day).getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                
                // Get trades for this day
                const dayTrades = trades.filter(t => t.date === dateStr);
                const dayPL = dayTrades.reduce((sum, t) => sum + parseFloat(t.profitLoss || 0), 0);
                
                // Get economic events for this day
                const dayEvents = economicEvents.filter(e => e.date === dateStr);
                const highImpactEvents = dayEvents.filter(e => e.impact === 'High');
                const holidayEvents = dayEvents.filter(e => e.type === 'holiday');
                
                // Weekly data
                const weekNum = Math.ceil((day + firstDay) / 7);
                if (!weeklyData[weekNum]) {
                    weeklyData[weekNum] = { pl: 0, trades: 0 };
                }
                
                if (!isWeekend) {
                    monthTrades += dayTrades.length;
                    monthPL += dayPL;
                    
                    const wins = dayTrades.filter(t => parseFloat(t.profitLoss || 0) > 0);
                    const losses = dayTrades.filter(t => parseFloat(t.profitLoss || 0) < 0);
                    monthWins += wins.length;
                    monthLosses += losses.length;
                    
                    wins.forEach(t => {
                        totalWinAmount += parseFloat(t.profitLoss || 0);
                        if (t.rr && t.rr.includes(':')) {
                            const parts = t.rr.split(':');
                            if (parts.length === 2) {
                                const rr = parseFloat(parts[1]) / parseFloat(parts[0]);
                                if (!isNaN(rr)) rrWins.push(rr);
                            }
                        }
                    });
                    losses.forEach(t => totalLossAmount += Math.abs(parseFloat(t.profitLoss || 0)));
                    
                    weeklyData[weekNum].pl += dayPL;
                    weeklyData[weekNum].trades += dayTrades.length;
                }
                
                // Set cell class
                if (isWeekend) {
                    cell.className = 'day-cell weekend';
                } else if (dayTrades.length > 0) {
                    cell.className = dayPL >= 0 ? 'day-cell profit-day' : 'day-cell loss-day';
                } else {
                    cell.className = 'day-cell';
                }
                
                // Highlight today
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    cell.classList.add('today');
                }
                
                // Build cell content
                let content = `<div class="day-number">${day}</div><div class="day-content">`;
                
                if (isWeekend) {
                    content += `<div class="weekend-label">Weekend</div>`;
                } else {
                    // Show trades
                    if (dayTrades.length > 0) {
                        const sign = dayPL >= 0 ? '+' : '';
                        const profitClass = dayPL >= 0 ? 'positive' : 'negative';
                        content += `
                            <div class="day-profit ${profitClass}">${sign}$${dayPL.toFixed(0)}</div>
                            <div class="day-trades-count">${dayTrades.length} trade${dayTrades.length > 1 ? 's' : ''}</div>
                        `;
                    }
                    
                    // Show HOLIDAYS (purple)
                    if (holidayEvents.length > 0) {
                        holidayEvents.forEach(h => {
                            content += `<div class="day-news holiday">🟣 ${h.name}</div>`;
                        });
                    }
                    
                    // Show HIGH IMPACT events (red)
                    if (highImpactEvents.length > 0) {
                        const eventNames = highImpactEvents.map(e => {
                            const time = e.time !== 'TBA' ? ` ${e.time}` : '';
                            return `${e.name}${time}`;
                        }).slice(0, 2); // Show max 2 events
                        
                        content += `<div class="day-news high-impact">🔴 ${eventNames.join(', ')}</div>`;
                        
                        if (highImpactEvents.length > 2) {
                            content += `<div class="day-news high-impact">+${highImpactEvents.length - 2} more</div>`;
                        }
                    }
                }
                
                content += '</div>';
                cell.innerHTML = content;
                
                // Click to open modal
                if (!isWeekend) {
                    cell.onclick = () => openDayModal(dateStr, dayEvents, dayTrades);
                }
                
                calendarGrid.appendChild(cell);
            }
            
            // Update stats
            document.getElementById('totalTrades').textContent = monthTrades;
            
            if (rrWins.length > 0) {
                const avgRR = rrWins.reduce((a, b) => a + b, 0) / rrWins.length;
                document.getElementById('avgRR').textContent = '1:' + avgRR.toFixed(1);
            } else {
                document.getElementById('avgRR').textContent = '-';
            }
            
            const winRate = monthTrades > 0 ? (monthWins / monthTrades * 100) : 0;
            drawDonut(winRate);
            
            const plSign = monthPL >= 0 ? '+' : '';
            document.getElementById('monthPL').textContent = `${plSign}$${monthPL.toFixed(2)}`;
            
            const plCard = document.getElementById('plCard');
            plCard.classList.remove('profit', 'loss');
            plCard.classList.add(monthPL >= 0 ? 'profit' : 'loss');
            
            const avgWin = monthWins > 0 ? totalWinAmount / monthWins : 0;
            const avgLoss = monthLosses > 0 ? totalLossAmount / monthLosses : 0;
            
            document.getElementById('avgWin').textContent = avgWin.toFixed(0);
            document.getElementById('avgLoss').textContent = avgLoss.toFixed(0);
            
            const total = avgWin + avgLoss;
            if (total > 0) {
                const winPercent = (avgWin / total) * 100;
                document.getElementById('avgWinsBar').style.width = winPercent + '%';
                document.getElementById('avgWinsBar').textContent = '$' + avgWin.toFixed(0);
                document.getElementById('avgLossesBar').style.width = (100 - winPercent) + '%';
                document.getElementById('avgLossesBar').textContent = '$' + avgLoss.toFixed(0);
            }
            
            // Weekly sidebar
            renderWeeklySidebar(weeklyData);
        }

        function renderWeeklySidebar(weeklyData) {
            const sidebar = document.getElementById('weeklySidebar');
            sidebar.innerHTML = '<div class="weekly-header">Weekly</div>';
            
            Object.keys(weeklyData).sort((a, b) => parseInt(a) - parseInt(b)).forEach(weekNum => {
                const data = weeklyData[weekNum];
                const sign = data.pl >= 0 ? '+' : '';
                const plClass = data.pl >= 0 ? 'positive' : 'negative';
                
                const card = document.createElement('div');
                card.className = 'weekly-total-card';
                card.innerHTML = `
                    <h4>Week ${weekNum}</h4>
                    <div class="amount ${plClass}">${sign}$${data.pl.toFixed(0)}</div>
                    <div style="font-size: 0.6rem; color: var(--text-secondary); margin-top: 4px;">
                        ${data.trades} trades
                    </div>
                `;
                sidebar.appendChild(card);
            });
        }

        function openDayModal(dateStr, events, dayTrades) {
            selectedDate = dateStr;
            const date = new Date(dateStr);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('modalDate').textContent = date.toLocaleDateString('en-US', options);
            
            let content = '';
            
            // Economic Events
            content += '<p class="section-title">📰 High Impact Economic Events</p>';
            if (events.length > 0) {
                events.forEach(event => {
                    const badgeClass = event.type === 'holiday' ? 'news-badge' : 'news-badge';
                    const badgeText = event.type === 'holiday' ? 'HOLIDAY' : 'HIGH IMPACT';
                    content += `
                        <div class="news-item">
                            <h4>${event.name} <span class="${badgeClass}">${badgeText}</span></h4>
                            <p>🕐 ${event.time} | 💵 ${event.currency || 'USD'}</p>
                        </div>
                    `;
                });
            } else {
                content += '<p class="no-content">No high impact events this day</p>';
            }
            
            // Trades
            content += '<p class="section-title">📊 Your Trades</p>';
            if (dayTrades.length > 0) {
                dayTrades.forEach(trade => {
                    const plSign = parseFloat(trade.profitLoss || 0) >= 0 ? '+' : '';
                    const plClass = parseFloat(trade.profitLoss || 0) >= 0 ? 'positive' : 'negative';
                    
                    content += `
                        <div class="trade-card">
                            <div class="trade-card-header">
                                <div class="trade-card-title">${trade.symbol} - ${trade.type}</div>
                                <div class="trade-card-pl ${plClass}">${plSign}$${parseFloat(trade.profitLoss || 0).toFixed(2)}</div>
                            </div>
                        </div>
                    `;
                });
            } else {
                content += '<p class="no-content">No trades this day</p>';
            }
            
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('dayModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        document.getElementById('dayModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initial render
        renderCalendar();
    </script>
</body>
</html>
