<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calendar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 svg {
            width: 32px;
            height: 32px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        .back-btn {
            background: #333;
            color: #e0e0e0;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: background 0.3s;
            font-size: 0.95rem;
        }

        .back-btn:hover { background: #444; }

        .forex-btn {
            background: #c62828;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: background 0.3s;
        }

        .forex-btn:hover { background: #b71c1c; }

        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: #2196f3;
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: background 0.3s;
        }

        .nav-btn:hover { background: #1976d2; }

        .month-year {
            font-size: 1.6rem;
            font-weight: 600;
            min-width: 220px;
            text-align: center;
        }

        .day-summary {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            gap: 15px;
            flex-wrap: wrap;
        }

        .summary-card {
            background: linear-gradient(145deg, #1a1a1a, #242424);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            flex: 1;
            min-width: 140px;
            text-align: center;
        }

        .summary-card h3 {
            color: #888;
            font-size: 0.8rem;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .summary-card .value { font-size: 1.5rem; font-weight: 700; }
        .summary-card.profit .value { color: #00c853; }
        .summary-card.loss .value { color: #ff5252; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 30px;
        }

        .day-header {
            text-align: center;
            padding: 12px 5px;
            color: #888;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .day-cell {
            background: linear-gradient(145deg, #1a1a1a, #1e1e1e);
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 8px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .day-cell:hover { 
            border-color: #2196f3; 
            transform: translateY(-2px);
        }

        .day-cell.today {
            border-color: #2196f3;
            background: linear-gradient(145deg, #0d1f3d, #1a1a1a);
        }

        .day-cell.other-month {
            opacity: 0.25;
            pointer-events: none;
        }

        .day-number {
            font-weight: 700;
            margin-bottom: 5px;
            font-size: 1rem;
        }

        .day-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .day-profit {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .day-profit.positive { color: #00c853; }
        .day-profit.negative { color: #ff5252; }
        .day-profit.neutral { color: #666; }

        .day-trades-count {
            font-size: 0.75rem;
            color: #888;
        }

        .day-news {
            font-size: 0.7rem;
            color: #ff5252;
            background: rgba(255, 82, 82, 0.1);
            padding: 2px 5px;
            border-radius: 4px;
            margin-top: auto;
        }

        /* Modal Styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal h2 {
            color: #fff;
            font-size: 1.3rem;
        }

        .close-btn {
            background: #333;
            border: none;
            color: #888;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }

        .close-btn:hover { background: #444; color: #fff; }

        .modal form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal input {
            background: #0d0d0d;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .modal input:focus {
            outline: none;
            border-color: #2196f3;
        }

        .modal button {
            background: #2196f3;
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.3s;
        }

        .modal button:hover { background: #1976d2; }

        .day-trades-list {
            margin-top: 20px;
        }

        .day-trades-list h3 {
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .trade-item {
            background: #0d0d0d;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .trade-item .symbol {
            font-weight: 600;
            color: #fff;
        }

        .trade-item .pl {
            font-weight: 700;
        }

        .trade-item .pl.positive { color: #00c853; }
        .trade-item .pl.negative { color: #ff5252; }

        .news-item {
            background: rgba(255, 82, 82, 0.1);
            border-left: 3px solid #ff5252;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 0 8px 8px 0;
        }

        .news-item h4 {
            color: #fff;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .news-item p {
            color: #888;
            font-size: 0.8rem;
        }

        .add-news-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }

        .add-news-section h3 {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .add-news-section input {
            width: 100%;
            margin-bottom: 10px;
        }

        .small-btn {
            padding: 8px 15px !important;
            font-size: 0.9rem !important;
        }

        .delete-news-btn {
            background: #333;
            border: none;
            color: #888;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-left: 10px;
        }

        .delete-news-btn:hover {
            background: #ff5252;
            color: #fff;
        }

        @media (max-width: 700px) {
            h1 { font-size: 1.4rem; }
            .calendar-grid { gap: 4px; }
            .day-cell { min-height: 70px; padding: 8px 5px; font-size: 0.85rem; }
            .day-news { font-size: 0.65rem; }
            .day-header { font-size: 0.75rem; padding: 8px 2px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                    <line x1="9" y1="2" x2="9" y2="6"/>
                    <line x1="15" y1="2" x2="15" y2="6"/>
                </svg>
                Trading Calendar
            </h1>
            <div class="nav-buttons">
                <a href="https://www.forexfactory.com/calendar" target="_blank" class="forex-btn">
                    📰 Forex Factory News
                </a>
                <a href="index.html" class="back-btn">← Menu</a>
            </div>
        </div>

        <div class="calendar-nav">
            <button class="nav-btn" onclick="previousMonth()">←</button>
            <div class="month-year" id="monthYear">January 2025</div>
            <button class="nav-btn" onclick="nextMonth()">→</button>
        </div>

        <div class="day-summary" id="monthSummary">
            <div class="summary-card">
                <h3>Month Trades</h3>
                <div class="value" id="monthTrades">0</div>
            </div>
            <div class="summary-card profit" id="plCard">
                <h3>Month P/L</h3>
                <div class="value" id="monthPL">$0.00</div>
            </div>
            <div class="summary-card">
                <h3>Win Rate</h3>
                <div class="value" id="monthWinRate">0%</div>
            </div>
            <div class="summary-card">
                <h3>News Events</h3>
                <div class="value" id="monthNews">0</div>
            </div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="day-header">Sun</div>
            <div class="day-header">Mon</div>
            <div class="day-header">Tue</div>
            <div class="day-header">Wed</div>
            <div class="day-header">Thu</div>
            <div class="day-header">Fri</div>
            <div class="day-header">Sat</div>
        </div>
    </div>

    <!-- Day Detail Modal -->
    <div class="modal-overlay" id="dayModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalDate">January 1, 2025</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>

            <div id="modalContent">
                <!-- Trades and news will be populated here -->
            </div>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let newsEvents = JSON.parse(localStorage.getItem('newsEvents')) || [];
        let currentDate = new Date();
        let selectedDate = null;

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"];
            
            document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            const calendarGrid = document.getElementById('calendarGrid');
            const dayHeaders = calendarGrid.querySelectorAll('.day-header');
            calendarGrid.innerHTML = '';
            dayHeaders.forEach(header => calendarGrid.appendChild(header.cloneNode(true)));
            
            // Empty cells for days before the 1st
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell other-month';
                calendarGrid.appendChild(emptyCell);
            }
            
            // Stats
            let monthTrades = 0;
            let monthPL = 0;
            let monthWins = 0;
            let monthNewsCount = 0;
            
            // Days of the month
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    cell.classList.add('today');
                }
                
                const dayTrades = trades.filter(t => t.date === dateStr);
                const dayNews = newsEvents.filter(n => n.date === dateStr);
                const dayPL = dayTrades.reduce((sum, t) => sum + t.profitLoss, 0);
                
                monthTrades += dayTrades.length;
                monthPL += dayPL;
                monthWins += dayTrades.filter(t => t.profitLoss > 0).length;
                monthNewsCount += dayNews.length;
                
                const profitClass = dayPL > 0 ? 'positive' : (dayPL < 0 ? 'negative' : 'neutral');
                const sign = dayPL >= 0 ? '+' : '';
                
                let content = `<div class="day-number">${day}</div><div class="day-content">`;
                
                if (dayTrades.length > 0) {
                    content += `
                        <div class="day-profit ${profitClass}">${sign}$${dayPL.toFixed(0)}</div>
                        <div class="day-trades-count">${dayTrades.length} trade${dayTrades.length > 1 ? 's' : ''}</div>
                    `;
                }
                
                if (dayNews.length > 0) {
                    content += `<div class="day-news">${dayNews.length} news</div>`;
                }
                
                content += '</div>';
                cell.innerHTML = content;
                cell.onclick = () => openDayModal(dateStr);
                
                calendarGrid.appendChild(cell);
            }
            
            // Update summary
            document.getElementById('monthTrades').textContent = monthTrades;
            const plSign = monthPL >= 0 ? '+' : '';
            document.getElementById('monthPL').textContent = `${plSign}$${monthPL.toFixed(2)}`;
            
            const plCard = document.getElementById('plCard');
            plCard.classList.remove('profit', 'loss');
            plCard.classList.add(monthPL >= 0 ? 'profit' : 'loss');
            
            document.getElementById('monthWinRate').textContent = monthTrades > 0 
                ? `${((monthWins / monthTrades) * 100).toFixed(0)}%` 
                : '0%';
            document.getElementById('monthNews').textContent = monthNewsCount;
        }

        function openDayModal(dateStr) {
            selectedDate = dateStr;
            const date = new Date(dateStr);
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('modalDate').textContent = date.toLocaleDateString('en-US', options);
            
            const dayTrades = trades.filter(t => t.date === dateStr);
            const dayNews = newsEvents.filter(n => n.date === dateStr);
            
            let content = '';
            
            // News events
            if (dayNews.length > 0) {
                content += '<div class="day-trades-list"><h3>📰 News Events (Red Impact USD)</h3>';
                dayNews.forEach(news => {
                    content += `
                        <div class="news-item">
                            <h4>${news.title}</h4>
                            <p>${news.time || 'All day'}</p>
                            <button class="delete-news-btn" onclick="deleteNews('${news.id}')">Delete</button>
                        </div>
                    `;
                });
                content += '</div>';
            }
            
            // Trades
            if (dayTrades.length > 0) {
                content += '<div class="day-trades-list"><h3>Trades</h3>';
                dayTrades.forEach(trade => {
                    const plClass = trade.profitLoss >= 0 ? 'positive' : 'negative';
                    const sign = trade.profitLoss >= 0 ? '+' : '';
                    content += `
                        <div class="trade-item">
                            <div>
                                <span class="symbol">${trade.symbol}</span>
                                <span style="color: #888; margin-left: 10px;">${trade.type}</span>
                            </div>
                            <span class="pl ${plClass}">${sign}$${trade.profitLoss.toFixed(2)}</span>
                        </div>
                    `;
                });
                content += '</div>';
            }
            
            if (dayTrades.length === 0 && dayNews.length === 0) {
                content += '<p style="color: #666; text-align: center;">No trades or news for this day</p>';
            }
            
            // Add news form
            content += `
                <div class="add-news-section">
                    <h3>+ Add News Event</h3>
                    <input type="text" id="newsTitle" placeholder="News title (e.g., NFP, FOMC)">
                    <input type="text" id="newsTime" placeholder="Time (optional)">
                    <button class="small-btn" onclick="addNews()">Add News</button>
                </div>
            `;
            
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('dayModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
        }

        function addNews() {
            const title = document.getElementById('newsTitle').value.trim();
            const time = document.getElementById('newsTime').value.trim();
            
            if (!title) {
                alert('Please enter a news title');
                return;
            }
            
            const news = {
                id: Date.now().toString(),
                date: selectedDate,
                title: title,
                time: time || ''
            };
            
            newsEvents.push(news);
            localStorage.setItem('newsEvents', JSON.stringify(newsEvents));
            
            openDayModal(selectedDate);
            renderCalendar();
        }

        function deleteNews(id) {
            newsEvents = newsEvents.filter(n => n.id !== id);
            localStorage.setItem('newsEvents', JSON.stringify(newsEvents));
            openDayModal(selectedDate);
            renderCalendar();
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // Close modal when clicking outside
        document.getElementById('dayModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        renderCalendar();
    </script>
</body>
</html>
