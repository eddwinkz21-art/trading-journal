<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
            --accent-blue: #2196f3;
        }

        .theme-white {
            --bg-primary: #ffffff;
            --bg-secondary: #f8f8f8;
            --bg-card: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #555;
            --border-color: #ddd;
        }

        .theme-darkblue {
            --bg-primary: #0a1929;
            --bg-secondary: #132f4c;
            --bg-card: #1a3a5c;
            --text-primary: #e0e0e0;
            --text-secondary: #8ab4d8;
            --border-color: #1e3a5f;
        }

        .theme-black {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #888;
            --border-color: #333;
        }

        .theme-purple {
            --bg-primary: #1a0a2e;
            --bg-secondary: #2d1b4e;
            --bg-card: #3d2b5e;
            --text-primary: #e8d5f5;
            --text-secondary: #b794d4;
            --border-color: #4a2c7a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            transition: all 0.5s ease;
            overflow-x: hidden;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
            animation-delay: 0.3s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: var(--text-primary);
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .back-btn {
            background: var(--bg-secondary);
            color: var(--text-primary);
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .back-btn:hover {
            background: var(--bg-card);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .calendar-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background: linear-gradient(135deg, #2196f3, #1976d2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.3rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.3);
        }

        .nav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(33, 150, 243, 0.5);
        }

        .month-year {
            font-size: 1.6rem;
            font-weight: 700;
            min-width: 220px;
            text-align: center;
        }

        /* Stats Grid - Updated for 7 cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 10px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .stat-card h3 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .stat-card .value {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card .sub-value {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-card.profit .value { color: #00c853; }
        .stat-card.loss .value { color: #ff5252; }

        .best-day-card .value { color: #00e676; }
        .worst-day-card .value { color: #ff5252; }

        .winrate-card {
            grid-column: span 2;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .winrate-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .winrate-card h3 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .donut-container {
            position: relative;
            width: 70px;
            height: 70px;
        }

        .donut-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .avg-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px;
            transition: all 0.3s ease;
        }

        .avg-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .avg-card h3 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .avg-bar {
            display: flex;
            height: 28px;
            border-radius: 14px;
            overflow: hidden;
            background: var(--bg-primary);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .avg-wins, .avg-losses {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.5s ease;
        }

        .avg-wins { background: linear-gradient(90deg, #00c853, #00e676); color: #000; }
        .avg-losses { background: linear-gradient(90deg, #ff5252, #ff1744); color: #fff; }

        .avg-values {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.75rem;
        }

        .avg-values .win { color: #00c853; font-weight: 600; }
        .avg-values .loss { color: #ff5252; font-weight: 600; }

        /* Calendar */
        .calendar-wrapper {
            display: flex;
            gap: 15px;
            overflow-x: auto;
        }

        .calendar-main { flex: 1; min-width: 700px; }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .day-header {
            text-align: center;
            padding: 12px 5px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .day-header.weekend { color: #ff5252; }

        .day-cell {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px 6px;
            min-height: 85px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .day-cell:hover:not(.weekend):not(.other-month) {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border-color: #2196f3;
        }

        .day-cell.today {
            border: 2px solid #2196f3;
            box-shadow: 0 0 20px rgba(33, 150, 243, 0.3);
        }

        .day-cell.profit-day {
            background: linear-gradient(145deg, #0a2e0a, #0d1a0d);
            border-color: #00c853;
        }

        .day-cell.loss-day {
            background: linear-gradient(145deg, #2e0a0a, #1a0d0d);
            border-color: #ff5252;
        }

        .day-cell.weekend {
            background: linear-gradient(145deg, #1a1a1a, #1a1a1a);
            border-color: #2a2a2a;
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .day-cell.other-month {
            opacity: 0.15;
            pointer-events: none;
        }

        .day-number {
            font-weight: 700;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .day-cell.profit-day .day-number { color: #00c853; }
        .day-cell.loss-day .day-number { color: #ff5252; }

        .day-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .day-profit {
            font-size: 0.8rem;
            font-weight: 700;
        }

        .day-profit.positive { color: #00c853; }
        .day-profit.negative { color: #ff5252; }

        .day-trades-count {
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .day-comment-indicator {
            font-size: 0.6rem;
            color: var(--accent-blue);
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .weekend-label {
            font-size: 0.6rem;
            color: #ff5252;
            text-align: center;
            margin-top: auto;
        }

        /* Weekly Sidebar */
        .weekly-sidebar {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 90px;
        }

        .weekly-header {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .weekly-total-card {
            background: linear-gradient(145deg, var(--bg-secondary), var(--bg-card));
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            min-height: 85px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .weekly-total-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .weekly-total-card h4 {
            color: var(--text-secondary);
            font-size: 0.65rem;
            margin-bottom: 4px;
        }

        .weekly-total-card .amount { font-size: 0.9rem; font-weight: 700; }
        .weekly-total-card .amount.positive { color: #00c853; }
        .weekly-total-card .amount.negative { color: #ff5252; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            margin: 20px auto;
            animation: modalSlide 0.3s ease forwards;
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal h2 {
            color: var(--text-primary);
            font-size: 1.3rem;
        }

        .close-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .close-btn:hover { 
            background: #ff5252; 
            color: #fff;
            transform: rotate(90deg);
        }

        .section-title {
            color: var(--accent-blue);
            font-size: 0.9rem;
            margin: 20px 0 10px 0;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .trade-card {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .trade-card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.1);
        }

        .trade-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .trade-card-title { font-size: 1.1rem; font-weight: 600; }
        .trade-card-pl { font-size: 1.2rem; font-weight: 700; }
        .trade-card-pl.positive { color: #00c853; }
        .trade-card-pl.negative { color: #ff5252; }

        .trade-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .trade-card-item {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 8px;
        }

        .trade-card-item h5 {
            color: var(--text-secondary);
            font-size: 0.7rem;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .trade-card-item p { color: var(--text-primary); font-size: 0.9rem; }

        .tier-badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .tier-aplus { background: linear-gradient(135deg, #ffd700, #ffca28); color: #000; }
        .tier-a { background: linear-gradient(135deg, #c0c0c0, #e0e0e0); color: #000; }
        .tier-b { background: linear-gradient(135deg, #cd7f32, #d4a574); color: #000; }

        .session-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .session-London { background: linear-gradient(135deg, #1a237e, #283593); color: #fff; }
        .session-Asia { background: linear-gradient(135deg, #b71c1c, #c62828); color: #fff; }
        .session-NewYork { background: linear-gradient(135deg, #1b5e20, #2e7d32); color: #fff; }

        .trade-card-notes { margin-top: 12px; }
        .trade-card-notes h5 { color: var(--text-secondary); font-size: 0.75rem; margin-bottom: 6px; }
        .trade-card-notes p { color: #aaa; font-size: 0.85rem; white-space: pre-wrap; }

        .trade-card-images {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .trade-card-images img {
            max-width: 150px;
            max-height: 100px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .trade-card-images img:hover { transform: scale(1.05); }

        .comment-textarea {
            width: 100%;
            min-height: 100px;
            padding: 14px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.9rem;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .comment-textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.2);
        }

        .save-comment-btn {
            margin-top: 12px;
            background: linear-gradient(135deg, var(--accent-blue), #1976d2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .save-comment-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(33, 150, 243, 0.4);
        }

        .no-content { color: #666; text-align: center; padding: 20px; font-style: italic; }

        .weekend-modal {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
        }

        .weekend-modal h3 { color: #ff5252; margin-bottom: 12px; font-size: 1.3rem; }
        .weekend-modal p { color: var(--text-secondary); }

        /* Zoom Modal */
        .zoom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .zoom-modal.active { display: flex; }

        .zoom-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            transition: transform 0.3s ease;
        }

        .zoom-controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        .zoom-controls button {
            background: #333;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .zoom-controls button:hover { 
            background: #444;
            transform: translateY(-2px);
        }

        @media (max-width: 900px) {
            .winrate-card { grid-column: span 1; }
            .calendar-wrapper { flex-direction: column; }
            .calendar-main { min-width: 100%; }
            .weekly-sidebar { flex-direction: row; min-width: 100%; overflow-x: auto; }
            .weekly-total-card { min-width: 80px; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; }
            .calendar-grid { gap: 3px; }
            .day-cell { min-height: 60px; padding: 6px 3px; }
            .day-header { font-size: 0.65rem; padding: 6px 2px; }
            .day-profit { font-size: 0.7rem; }
            .modal { padding: 15px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .winrate-card, .avg-card { grid-column: span 2; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loader"></div>
        <div class="loader-text">Loading Calendar...</div>
    </div>

    <div class="container">
        <div class="header">
            <h1>📅 Trading Calendar</h1>
            <div class="nav-buttons">
                <a href="index.html" class="back-btn">← Menu</a>
            </div>
        </div>

        <div class="calendar-nav">
            <button class="nav-btn" onclick="previousMonth()">←</button>
            <div class="month-year" id="monthYear">January 2025</div>
            <button class="nav-btn" onclick="nextMonth()">→</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <h3>Total Trades</h3>
                <div class="value" id="totalTrades">0</div>
            </div>
            <div class="stat-card">
                <h3>Avg RR</h3>
                <div class="value" id="avgRR">-</div>
            </div>
            <div class="stat-card profit" id="plCard">
                <h3>Month P/L</h3>
                <div class="value" id="monthPL">$0.00</div>
            </div>
            <div class="stat-card best-day-card">
                <h3>📈 Best Day</h3>
                <div class="value" id="bestDay">-</div>
                <div class="sub-value" id="bestDayWR">0% WR</div>
            </div>
            <div class="stat-card worst-day-card">
                <h3>📉 Worst Day</h3>
                <div class="value" id="worstDay">-</div>
                <div class="sub-value" id="worstDayWR">0% WR</div>
            </div>
            <div class="winrate-card">
                <h3>Win Rate</h3>
                <div class="donut-container">
                    <canvas id="donutChart" width="70" height="70"></canvas>
                    <div class="donut-text" id="winRateText">0%</div>
                </div>
            </div>
            <div class="avg-card">
                <h3>Avg Win / Loss</h3>
                <div class="avg-bar">
                    <div class="avg-wins" id="avgWinsBar" style="width: 50%;">$0</div>
                    <div class="avg-losses" id="avgLossesBar" style="width: 50%;">$0</div>
                </div>
                <div class="avg-values">
                    <span class="win">Win: $<span id="avgWin">0</span></span>
                    <span class="loss">Loss: $<span id="avgLoss">0</span></span>
                </div>
            </div>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-main">
                <div class="calendar-grid" id="calendarGrid">
                    <div class="day-header weekend">Sun</div>
                    <div class="day-header">Mon</div>
                    <div class="day-header">Tue</div>
                    <div class="day-header">Wed</div>
                    <div class="day-header">Thu</div>
                    <div class="day-header">Fri</div>
                    <div class="day-header weekend">Sat</div>
                </div>
            </div>
            <div class="weekly-sidebar" id="weeklySidebar">
                <div class="weekly-header">Weekly</div>
            </div>
        </div>
    </div>

    <!-- Day Detail Modal -->
    <div class="modal-overlay" id="dayModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalDate">January 1, 2025</h2>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <div id="modalContent"></div>
        </div>
    </div>

    <!-- Zoom Modal -->
    <div class="zoom-modal" id="zoomModal" onclick="closeZoomModal()">
        <img id="zoomImage" src="" alt="Zoomed Image">
        <div class="zoom-controls" onclick="event.stopPropagation()">
            <button onclick="zoomIn()">+ Zoom In</button>
            <button onclick="zoomOut()">- Zoom Out</button>
            <button onclick="resetZoom()">Reset</button>
            <button onclick="closeZoomModal()">Close</button>
        </div>
    </div>

    <script>
        // Hide loading screen
        window.addEventListener('load', function() {
            setTimeout(function() {
                document.getElementById('loadingScreen').classList.add('hidden');
            }, 500);
        });

        // Load theme
        const savedTheme = localStorage.getItem('theme') || 'black';
        document.body.className = 'theme-' + savedTheme;

        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        let dailyComments = JSON.parse(localStorage.getItem('dailyComments')) || {};
        let currentDate = new Date();
        let selectedDate = null;
        let currentZoom = 1;

        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        function drawDonut(winPercent) {
            const canvas = document.getElementById('donutChart');
            const ctx = canvas.getContext('2d');
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = 30;
            const lineWidth = 10;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = lineWidth;
            ctx.stroke();
            
            if (winPercent > 0) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, -Math.PI / 2, -Math.PI / 2 + (2 * Math.PI * winPercent / 100));
                ctx.strokeStyle = '#00c853';
                ctx.lineWidth = lineWidth;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
            
            document.getElementById('winRateText').textContent = winPercent.toFixed(0) + '%';
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            const monthNames = ["January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"];
            
            document.getElementById('monthYear').textContent = `${monthNames[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();
            
            const calendarGrid = document.getElementById('calendarGrid');
            const dayHeaders = calendarGrid.querySelectorAll('.day-header');
            calendarGrid.innerHTML = '';
            dayHeaders.forEach(header => calendarGrid.appendChild(header.cloneNode(true)));
            
            for (let i = 0; i < firstDay; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell other-month';
                calendarGrid.appendChild(emptyCell);
            }
            
            let monthTrades = 0;
            let monthPL = 0;
            let monthWins = 0;
            let monthLosses = 0;
            let totalWinAmount = 0;
            let totalLossAmount = 0;
            let rrWins = [];
            let weeklyData = {};
            let dayOfWeekStats = {}; // { dayIndex: { wins: 0, total: 0 } }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('div');
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const dayOfWeek = new Date(year, month, day).getDay();
                const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
                
                const dayTrades = trades.filter(t => t.date === dateStr);
                const dayPL = dayTrades.reduce((sum, t) => sum + t.profitLoss, 0);
                
                const weekNum = Math.ceil((day + firstDay) / 7);
                if (!weeklyData[weekNum]) {
                    weeklyData[weekNum] = { pl: 0, trades: 0 };
                }
                
                if (!isWeekend) {
                    monthTrades += dayTrades.length;
                    monthPL += dayPL;
                    const wins = dayTrades.filter(t => t.profitLoss > 0);
                    const losses = dayTrades.filter(t => t.profitLoss < 0);
                    monthWins += wins.length;
                    monthLosses += losses.length;
                    
                    // Track day of week stats
                    if (!dayOfWeekStats[dayOfWeek]) dayOfWeekStats[dayOfWeek] = { wins: 0, total: 0 };
                    dayOfWeekStats[dayOfWeek].total += dayTrades.length;
                    dayOfWeekStats[dayOfWeek].wins += wins.length;
                    
                    wins.forEach(t => {
                        totalWinAmount += t.profitLoss;
                        if (t.rr && t.rr.includes(':')) {
                            const parts = t.rr.split(':');
                            if (parts.length === 2) {
                                const rr = parseFloat(parts[1]) / parseFloat(parts[0]);
                                if (!isNaN(rr)) rrWins.push(rr);
                            }
                        }
                    });
                    losses.forEach(t => totalLossAmount += Math.abs(t.profitLoss));
                    
                    weeklyData[weekNum].pl += dayPL;
                    weeklyData[weekNum].trades += dayTrades.length;
                }
                
                if (isWeekend) {
                    cell.className = 'day-cell weekend';
                } else if (dayTrades.length > 0) {
                    cell.className = dayPL >= 0 ? 'day-cell profit-day' : 'day-cell loss-day';
                } else {
                    cell.className = 'day-cell';
                }
                
                if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === day) {
                    cell.classList.add('today');
                }
                
                const profitClass = dayPL >= 0 ? 'positive' : 'negative';
                const sign = dayPL >= 0 ? '+' : '';
                
                let content = `<div class="day-number">${day}</div><div class="day-content">`;
                
                if (isWeekend) {
                    content += `<div class="weekend-label">No Trading</div>`;
                } else {
                    if (dayTrades.length > 0) {
                        content += `
                            <div class="day-profit ${profitClass}">${sign}$${dayPL.toFixed(0)}</div>
                            <div class="day-trades-count">${dayTrades.length} trade${dayTrades.length > 1 ? 's' : ''}</div>
                        `;
                    }
                    
                    // Show comment indicator if exists
                    if (dailyComments[dateStr]) {
                        content += `<div class="day-comment-indicator">📝 Note</div>`;
                    }
                }
                
                content += '</div>';
                cell.innerHTML = content;
                
                if (!isWeekend) {
                    cell.onclick = () => openDayModal(dateStr);
                }
                
                calendarGrid.appendChild(cell);
            }
            
            // Update Stats
            document.getElementById('totalTrades').textContent = monthTrades;
            
            if (rrWins.length > 0) {
                const avgRR = rrWins.reduce((a, b) => a + b, 0) / rrWins.length;
                document.getElementById('avgRR').textContent = '1:' + avgRR.toFixed(1);
            } else {
                document.getElementById('avgRR').textContent = '-';
            }
            
            const winRate = monthTrades > 0 ? (monthWins / monthTrades * 100) : 0;
            drawDonut(winRate);
            
            const plSign = monthPL >= 0 ? '+' : '';
            document.getElementById('monthPL').textContent = `${plSign}$${monthPL.toFixed(2)}`;
            
            const plCard = document.getElementById('plCard');
            plCard.classList.remove('profit', 'loss');
            plCard.classList.add(monthPL >= 0 ? 'profit' : 'loss');
            
            const avgWin = monthWins > 0 ? totalWinAmount / monthWins : 0;
            const avgLoss = monthLosses > 0 ? totalLossAmount / monthLosses : 0;
            
            document.getElementById('avgWin').textContent = avgWin.toFixed(0);
            document.getElementById('avgLoss').textContent = avgLoss.toFixed(0);
            
            const total = avgWin + avgLoss;
            if (total > 0) {
                const winPercent = (avgWin / total) * 100;
                document.getElementById('avgWinsBar').style.width = winPercent + '%';
                document.getElementById('avgWinsBar').textContent = '$' + avgWin.toFixed(0);
                document.getElementById('avgLossesBar').style.width = (100 - winPercent) + '%';
                document.getElementById('avgLossesBar').textContent = '$' + avgLoss.toFixed(0);
            }

            // Calculate Best & Worst Day (by Win Rate)
            let bestDay = '-', worstDay = '-', bestWR = -1, worstWR = 101;
            let foundBest = false, foundWorst = false;
            
            for (let d = 1; d <= 5; d++) { // Mon-Fri
                if (dayOfWeekStats[d] && dayOfWeekStats[d].total > 0) {
                    const wr = (dayOfWeekStats[d].wins / dayOfWeekStats[d].total) * 100;
                    if (!foundBest || wr > bestWR) {
                        bestWR = wr;
                        bestDay = dayNames[d];
                        foundBest = true;
                    }
                    if (!foundWorst || wr < worstWR) {
                        worstWR = wr;
                        worstDay = dayNames[d];
                        foundWorst = true;
                    }
                }
            }
            
            document.getElementById('bestDay').textContent = foundBest ? bestDay : '-';
            document.getElementById('bestDayWR').textContent = foundBest ? bestWR.toFixed(1) + '% WR' : '';
            document.getElementById('worstDay').textContent = foundWorst ? worstDay : '-';
            document.getElementById('worstDayWR').textContent = foundWorst ? worstWR.toFixed(1) + '% WR' : '';

            renderWeeklySidebar(weeklyData);
        }

        function renderWeeklySidebar(weeklyData) {
            const sidebar = document.getElementById('weeklySidebar');
            sidebar.innerHTML = '<div class="weekly-header">Weekly</div>';
            
            Object.keys(weeklyData).sort((a, b) => parseInt(a) - parseInt(b)).forEach(weekNum => {
                const data = weeklyData[weekNum];
                const sign = data.pl >= 0 ? '+' : '';
                const plClass = data.pl >= 0 ? 'positive' : 'negative';
                
                const card = document.createElement('div');
                card.className = 'weekly-total-card';
                card.innerHTML = `
                    <h4>Week ${weekNum}</h4>
                    <div class="amount ${plClass}">${sign}$${data.pl.toFixed(0)}</div>
                    <div style="font-size: 0.6rem; color: var(--text-secondary); margin-top: 4px;">
                        ${data.trades} trades
                    </div>
                `;
                sidebar.appendChild(card);
            });
        }

        function openDayModal(dateStr) {
            selectedDate = dateStr;
            const date = new Date(dateStr);
            const dayOfWeek = date.getDay();
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('modalDate').textContent = date.toLocaleDateString('en-US', options);
            
            if (isWeekend) {
                document.getElementById('modalContent').innerHTML = `
                    <div class="weekend-modal">
                        <h3>🚫 Weekend - No Trading</h3>
                        <p>Markets are closed on weekends. Use this time to review your trades and plan for next week!</p>
                    </div>
                `;
                document.getElementById('dayModal').classList.add('active');
                return;
            }
            
            const dayTrades = trades.filter(t => t.date === dateStr);
            const savedComment = dailyComments[dateStr] || '';
            
            let content = '';
            
            // Daily Notes Section
            content += `
                <p class="section-title">📝 Daily Notes</p>
                <textarea id="dayComment" class="comment-textarea" placeholder="Market conditions, emotions, lessons learned, or anything else...">${savedComment}</textarea>
                <button class="save-comment-btn" onclick="saveDayComment()">💾 Save Notes</button>
            `;
            
            // Trades Section
            content += '<p class="section-title">📊 Trades</p>';
            if (dayTrades.length > 0) {
                dayTrades.forEach(trade => {
                    const plSign = trade.profitLoss >= 0 ? '+' : '';
                    const plClass = trade.profitLoss >= 0 ? 'positive' : 'negative';
                    const tierClass = trade.tier === 'A+' ? 'tier-aplus' : (trade.tier === 'A' ? 'tier-a' : 'tier-b');
                    const sessionClass = `session-${trade.session.replace(' ', '')}`;
                    
                    content += `
                        <div class="trade-card">
                            <div class="trade-card-header">
                                <div class="trade-card-title">
                                    ${trade.symbol} <span class="tier-badge ${tierClass}">Tier ${trade.tier}</span> 
                                    <span class="session-tag ${sessionClass}">${trade.session}</span>
                                </div>
                                <div class="trade-card-pl ${plClass}">${plSign}$${trade.profitLoss.toFixed(2)}</div>
                            </div>
                            <div class="trade-card-grid">
                                <div class="trade-card-item">
                                    <h5>Type</h5>
                                    <p>${trade.type}</p>
                                </div>
                                <div class="trade-card-item">
                                    <h5>Time (NY)</h5>
                                    <p>${trade.tradeHour || '-'}</p>
                                </div>
                                <div class="trade-card-item">
                                    <h5>Duration</h5>
                                    <p>${trade.duration || '-'}</p>
                                </div>
                                <div class="trade-card-item">
                                    <h5>R:R</h5>
                                    <p>${trade.rr || '-'}</p>
                                </div>
                            </div>
                            <div class="trade-card-notes">
                                <h5>Confirmations</h5>
                                <p>${trade.confirmations || '-'}</p>
                            </div>
                            <div class="trade-card-notes">
                                <h5>What could you improve? How was today's PA?</h5>
                                <p>${trade.improvement || '-'}</p>
                            </div>
                    `;
                    
                    if (trade.tradeImage || trade.proofImage) {
                        content += '<div class="trade-card-images">';
                        if (trade.tradeImage) {
                            content += `<img src="${trade.tradeImage}" alt="Setup" onclick="showFullImage('${trade.tradeImage}')">`;
                        }
                        if (trade.proofImage) {
                            content += `<img src="${trade.proofImage}" alt="Proof" onclick="showFullImage('${trade.proofImage}')">`;
                        }
                        content += '</div>';
                    }
                    
                    content += '</div>';
                });
            } else {
                content += '<p class="no-content">No trades on this day</p>';
            }
            
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('dayModal').classList.add('active');
        }

        function saveDayComment() {
            const comment = document.getElementById('dayComment').value.trim();
            dailyComments[selectedDate] = comment;
            localStorage.setItem('dailyComments', JSON.stringify(dailyComments));
            
            // Update button feedback
            const btn = document.querySelector('.save-comment-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✅ Saved!';
            btn.style.background = '#00c853';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '';
            }, 1500);
            
            renderCalendar(); // Refresh to show note indicator
        }

        function closeModal() {
            document.getElementById('dayModal').classList.remove('active');
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        function showFullImage(src) {
            document.getElementById('zoomImage').src = src;
            currentZoom = 1;
            document.getElementById('zoomImage').style.transform = 'scale(1)';
            document.getElementById('zoomModal').classList.add('active');
        }

        function zoomIn() {
            currentZoom += 0.25;
            document.getElementById('zoomImage').style.transform = 'scale(' + currentZoom + ')';
        }

        function zoomOut() {
            if (currentZoom > 0.5) {
                currentZoom -= 0.25;
                document.getElementById('zoomImage').style.transform = 'scale(' + currentZoom + ')';
            }
        }

        function resetZoom() {
            currentZoom = 1;
            document.getElementById('zoomImage').style.transform = 'scale(1)';
        }

        function closeZoomModal() {
            document.getElementById('zoomModal').classList.remove('active');
        }

        document.getElementById('dayModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        renderCalendar();
    </script>
</body>
</html>
