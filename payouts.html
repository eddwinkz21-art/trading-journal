        /* --- NEW SIDEBAR CODE --- */
.sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 90px;
    background: #0d1117; /* Dark background */
    border-right: 1px solid #30363d;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    z-index: 1000;
    overflow-y: auto;
}
.sidebar-item {
    display: flex; align-items: center; justify-content: center;
    width: 50px; height: 50px;
    border-radius: 12px;
    font-size: 1.3rem;
    text-decoration: none;
    color: #8b949e;
    margin-bottom: 10px;
    transition: all 0.2s;
}
.sidebar-item:hover { background: #21262d; color: #fff; transform: scale(1.1); }
.sidebar-item.active { background: #1f6feb; color: white; }
/* Make Dashboard icons bigger */
.sidebar-big { font-size: 1.8rem !important; background: linear-gradient(135deg, #667eea, #764ba2); color: white; margin-bottom: 25px; }

/* Push all page content to the right so it doesn't hide behind the sidebar */
body { padding-left: 110px !important; }

/* Hide old headers/buttons to avoid duplicates */
.header-controls { display: none !important; }
.footer { padding-left: 0 !important; }
        :root { --bg:#0d0d0d; --card:#1a1a1a; --text:#e0e0e0; --text2:#888; --border:#333; --accent:#2196f3; }
        .theme-white { --bg:#fff; --card:#fff; --text:#111; --text2:#555; --border:#ddd; }
        .theme-darkblue { --bg:#0a1929; --card:#1a3a5c; --text:#e0e0e0; --text2:#8ab4d8; --border:#1e3a5f; }
        .theme-purple { --bg:#1a0a2e; --card:#3d2b5e; --text:#e8d5f5; --text2:#b794d4; --border:#4a2c7a; }
        .theme-darkred { --bg-primary:#1a0505; --bg-secondary:#2b0a0a; --bg-card:#3d1212; --text-primary:#ffe6e6; --text-secondary:#a87b7b; --border-color:#5c1a1a; }
        .theme-darkbrown { --bg-primary:#1e120e; --bg-secondary:#331f17; --bg-card:#4a2d22; --text-primary:#e8dcd4; --text-secondary:#a89480; --border-color:#5c3a26; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .container { text-align:center; background:var(--card); border:1px solid var(--border); border-radius:20px; padding:40px; max-width:500px; width:100%; animation:fade 0.6s ease; }
        @keyframes fade { from { opacity:0; transform:translateY(20px);} to { opacity:1; transform:translateY(0);} }
        .icon { font-size:4rem; margin-bottom:20px; animation:float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform:translateY(0);} 50% { transform:translateY(-10px);} }
        h1 { font-size:1.8rem; margin-bottom:10px; }
        p { color:var(--text2); margin-bottom:25px; line-height:1.5; }
        .back-btn { background:var(--bg); color:var(--text); text-decoration:none; padding:12px 24px; border-radius:10px; border:1px solid var(--border); transition:all 0.3s; display:inline-block; }
        .back-btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.3); border-color:var(--accent); }

    <script>
        const savedTheme = localStorage.getItem('theme') || 'black';
        document.body.className = 'theme-' + savedTheme;

function checkForNotifications() {
    // Example: Check if any prop firm account is near drawdown
    const accounts = JSON.parse(localStorage.getItem('propfirms')) || [];
    accounts.forEach(acc => {
        const drawdownUsed = ((acc.size - acc.currentBalance) / acc.size) * 100;
        if (drawdownUsed > (acc.maxDrawdown * 0.8) && acc.status === 'active') {
            showNotification(`${acc.name} is at ${drawdownUsed.toFixed(1)}% drawdown!`, 'warning', 'Drawdown Alert');
        }
    });
    
    // Example: Check for upcoming earnings (mock)
    // In real app, fetch from calendar data
    // showNotification('AAPL earnings in 2 hours', 'info', 'Upcoming Event');
}

// Run checks every 5 minutes
setInterval(checkForNotifications, 300000);
checkForNotifications(); // Run on load
