<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg:#0a0a0a; --card:#1a1a1a; --text:#e0e0e0; --text2:#888; --border:#333; --green:#00c853; --red:#ff5252; --blue:#2196f3; }
        .theme-white { --bg:#f5f5f5; --card:#fff; --text:#111; --text2:#555; --border:#ddd; }
        .theme-darkblue { --bg:#0a1628; --card:#1e3a5f; --text:#e0e0e0; --text2:#8ab4d8; --border:#2a4a7a; }
        .theme-purple { --bg:#1a0a2e; --card:#3d2b5e; --text:#e8d5f5; --text2:#b794d4; --border:#4a2c7a; }
        .theme-darkred { --bg:#1a0505; --card:#3d1212; --text:#ffe6e6; --text2:#a87b7b; --border:#5c1a1a; }
        .theme-darkbrown { --bg:#1e120e; --card:#4a2d22; --text:#e8dcd4; --text2:#a89480; --border:#5c3a26; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:20px; }
        .container { max-width:1000px; margin:0 auto; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:30px; }
        h1 { font-size:1.8rem; font-weight:700; }
        .back-btn { background:var(--card); color:var(--text); text-decoration:none; padding:10px 18px; border-radius:8px; border:1px solid var(--border); transition:all 0.3s; }
        .back-btn:hover { transform:translateY(-2px); box-shadow:0 5px 15px rgba(0,0,0,0.3); }
        
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-bottom:30px; }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center; transition:all 0.3s; }
        .stat-card:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,0.2); }
        .stat-card h3 { font-size:0.8rem; color:var(--text2); margin-bottom:8px; text-transform:uppercase; }
        .stat-card .value { font-size:1.8rem; font-weight:700; }
        .stat-card.green .value { color:var(--green); }
        .stat-card.red .value { color:var(--red); }
        .stat-card.blue .value { color:var(--blue); }
        
        .session-grid { display:grid; grid-template-columns:repeat(3, 1fr); gap:15px; margin-top:20px; }
        .session-card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:15px; text-align:center; }
        .session-card h4 { font-size:0.9rem; margin-bottom:8px; color:var(--text2); }
        .session-card .wr { font-size:1.4rem; font-weight:700; }
        .session-card .meta { font-size:0.8rem; color:var(--text2); margin-top:4px; display:flex; justify-content:center; gap:8px; }
        
        @media(max-width:768px) { .session-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Trading Analytics</h1>
            <a href="index.html" class="back-btn">← Dashboard</a>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card blue">
                <h3>Total Trades</h3>
                <div class="value" id="totalTrades">0</div>
            </div>
            <div class="stat-card green">
                <h3>Overall Win Rate</h3>
                <div class="value" id="overallWR">0%</div>
            </div>
            <div class="stat-card">
                <h3>Avg Trade Duration</h3>
                <div class="value" id="avgDuration">0m</div>
            </div>
        </div>
        
        <h3 style="margin-bottom:15px; font-size:1.1rem;"> Session Performance</h3>
        <div class="session-grid">
            <div class="session-card">
                <h4>London</h4>
                <div class="wr" id="lonWR">0%</div>
                <div class="meta"><span>Win Rate</span><span id="lonTrades">0 trades</span></div>
            </div>
            <div class="session-card">
                <h4>New York</h4>
                <div class="wr" id="nyWR">0%</div>
                <div class="meta"><span>Win Rate</span><span id="nyTrades">0 trades</span></div>
            </div>
            <div class="session-card">
                <h4>Asia</h4>
                <div class="wr" id="asiaWR">0%</div>
                <div class="meta"><span>Win Rate</span><span id="asiaTrades">0 trades</span></div>
            </div>
        </div>
        
        <div style="margin-top:30px; background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; text-align:center;">
            <h4 style="margin-bottom:15px; color:var(--text2);">Session Win Rate Distribution</h4>
            <div style="max-width:280px; margin:0 auto;"><canvas id="sessionChart"></canvas></div>
        </div>
    </div>
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'black';
        document.body.className = 'theme-' + savedTheme;
        
        const trades = JSON.parse(localStorage.getItem('trades')) || [];
        
        const total = trades.length;
        const wins = trades.filter(t => parseFloat(t.profitLoss || 0) > 0).length;
        const wr = total > 0 ? ((wins / total) * 100).toFixed(1) : 0;
        
        document.getElementById('totalTrades').textContent = total;
        document.getElementById('overallWR').textContent = wr + '%';
        
        const sessions = { London: [], 'New York': [], Asia: [] };
        trades.forEach(t => {
            if (sessions[t.session]) sessions[t.session].push(t);
        });
        
        const sessionData = {};
        Object.keys(sessions).forEach(sess => {
            const arr = sessions[sess];
            const sWins = arr.filter(t => parseFloat(t.profitLoss || 0) > 0).length;
            const sWR = arr.length > 0 ? ((sWins / arr.length) * 100).toFixed(1) : 0;
            sessionData[sess] = parseFloat(sWR);
            
            const idMap = { London: 'lon', 'New York': 'ny', Asia: 'asia' };
            document.getElementById(idMap[sess] + 'WR').textContent = sWR + '%';
            document.getElementById(idMap[sess] + 'Trades').textContent = arr.length + ' trades';
        });
        
        const durMap = { '<15m': 7.5, '15-30m': 22.5, '30-60m': 45, '>60m': 75 };
        const tradesWithDur = trades.filter(t => durMap[t.duration]);
        if (tradesWithDur.length > 0) {
            const avgDur = tradesWithDur.reduce((sum, t) => sum + durMap[t.duration], 0) / tradesWithDur.length;
            document.getElementById('avgDuration').textContent = Math.round(avgDur) + 'm';
        } else {
            document.getElementById('avgDuration').textContent = '0m';
        }
        
        // Donut Chart
        new Chart(document.getElementById('sessionChart'), {
            type: 'doughnut',
            data: {
                labels: ['London', 'New York', 'Asia'],
                datasets: [{
                    data: [sessionData['London'] || 0, sessionData['New York'] || 0, sessionData['Asia'] || 0],
                    backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                cutout: '65%',
                plugins: { 
                    legend: { position: 'bottom', labels: { color: '#888', padding: 15, font: { size: 11 } } },
                    tooltip: { backgroundColor: 'rgba(0,0,0,0.8)', titleColor: '#fff', bodyColor: '#e0e0e0' }
                }
            }
        });
    </script>
</body>
</html>
