<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #2196f3, #00c853);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #888;
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        .menu-grid {
            display: grid;
            gap: 20px;
        }

        .menu-card {
            background: linear-gradient(145deg, #1a1a1a, #242424);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 40px 30px;
            text-decoration: none;
            color: #e0e0e0;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-card:hover {
            border-color: #2196f3;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(33, 150, 243, 0.1);
        }

        .menu-card .icon {
            font-size: 2.5rem;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2196f3, #1976d2);
            border-radius: 12px;
        }

        .menu-card.calendar .icon {
            background: linear-gradient(135deg, #00c853, #009624);
        }

        .menu-card .content {
            text-align: left;
        }

        .menu-card h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            color: #fff;
        }

        .menu-card p {
            color: #888;
            font-size: 0.95rem;
        }

        .footer {
            margin-top: 50px;
            color: #555;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trading Dashboard</h1>
        <p class="subtitle">Choose where you want to go</p>

        <div class="menu-grid">
            <a href="journal.html" class="menu-card">
                <div class="icon">📊</div>
                <div class="content">
                    <h2>Trading Journal</h2>
                    <p>Track your trades, profits, and analyze your performance</p>
                </div>
            </a>

            <a href="calendar.html" class="menu-card calendar">
                <div class="icon">📅</div>
                <div class="content">
                    <h2>Calendar</h2>
                    <p>View your trading activity by date</p>
                </div>
            </a>
        </div>

        <p class="footer">Data is saved locally in your browser</p>
    </div>
</body>
</html>
