<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Journal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #ffffff;
            font-size: 2rem;
            letter-spacing: 1px;
        }

        .back-btn {
            background: #333;
            color: #e0e0e0;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            transition: background 0.3s;
            font-size: 0.95rem;
        }

        .back-btn:hover {
            background: #444;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(145deg, #1a1a1a, #242424);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
        }

        .stat-card h3 {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .value {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .stat-card.profit .value { color: #00c853; }
        .stat-card.loss .value { color: #ff5252; }
        .stat-card.neutral .value { color: #2196f3; }

        .add-trade-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .add-trade-section h2 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.2rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.85rem;
        }

        input, select, textarea {
            background: #0d0d0d;
            border: 1px solid #333;
            color: #e0e0e0;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2196f3;
        }

        .form-group.notes { grid-column: 1 / -1; }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background: #2196f3;
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            font-weight: 600;
        }

        button:hover { background: #1976d2; }
        button:active { transform: scale(0.98); }

        button.delete-btn {
            background: #d32f2f;
            padding: 8px 15px;
            font-size: 0.85rem;
        }
        button.delete-btn:hover { background: #b71c1c; }

        .trades-section {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 25px;
            overflow-x: auto;
        }

        .trades-section h2 {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            color: #888;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #0d0d0d;
        }

        tr:hover { background: #242424; }

        .profit-value { color: #00c853; font-weight: 600; }
        .loss-value { color: #ff5252; font-weight: 600; }

        .no-trades {
            text-align: center;
            color: #666;
            padding: 40px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .form-grid { grid-template-columns: 1fr; }
            .stat-card .value { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 Trading Journal</h1>
            <a href="index.html" class="back-btn">← Back to Menu</a>
        </div>

        <div class="stats-container">
            <div class="stat-card neutral">
                <h3>Total Trades</h3>
                <div class="value" id="totalTrades">0</div>
            </div>
            <div class="stat-card profit" id="profitCard">
                <h3>Total Profit/Loss</h3>
                <div class="value" id="totalProfit">$0.00</div>
            </div>
            <div class="stat-card neutral">
                <h3>Win Rate</h3>
                <div class="value" id="winRate">0%</div>
            </div>
            <div class="stat-card neutral">
                <h3>Avg Trade</h3>
                <div class="value" id="avgTrade">$0.00</div>
            </div>
        </div>

        <div class="add-trade-section">
            <h2>Add New Trade</h2>
            <form id="tradeForm" class="form-grid">
                <div class="form-group">
                    <label for="profitLoss">Profit/Loss ($)</label>
                    <input type="number" id="profitLoss" step="0.01" required placeholder="0.00">
                </div>
                <div class="form-group">
                    <label for="tradeDate">Date</label>
                    <input type="date" id="tradeDate" required>
                </div>
                <div class="form-group">
                    <label for="tradeType">Type</label>
                    <select id="tradeType">
                        <option value="long">Long</option>
                        <option value="short">Short</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="symbol">Symbol</label>
                    <input type="text" id="symbol" placeholder="e.g. AAPL">
                </div>
                <div class="form-group notes">
                    <label for="notes">Notes</label>
                    <textarea id="notes" placeholder="Trade analysis, setup, lessons learned..."></textarea>
                </div>
                <button type="submit">Add Trade</button>
            </form>
        </div>

        <div class="trades-section">
            <h2>Trade History</h2>
            <table id="tradesTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Symbol</th>
                        <th>Type</th>
                        <th>P/L</th>
                        <th>Notes</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tradesBody"></tbody>
            </table>
            <div class="no-trades" id="noTrades">No trades recorded yet. Add your first trade above!</div>
        </div>
    </div>

    <script>
        let trades = JSON.parse(localStorage.getItem('trades')) || [];
        document.getElementById('tradeDate').valueAsDate = new Date();

        const tradeForm = document.getElementById('tradeForm');
        const tradesBody = document.getElementById('tradesBody');
        const noTrades = document.getElementById('noTrades');

        tradeForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const trade = {
                id: Date.now(),
                profitLoss: parseFloat(document.getElementById('profitLoss').value),
                date: document.getElementById('tradeDate').value,
                type: document.getElementById('tradeType').value,
                symbol: document.getElementById('symbol').value.toUpperCase() || '-',
                notes: document.getElementById('notes').value
            };
            trades.unshift(trade);
            saveTrades();
            renderTrades();
            updateStats();
            tradeForm.reset();
            document.getElementById('tradeDate').valueAsDate = new Date();
        });

        function deleteTrade(id) {
            trades = trades.filter(trade => trade.id !== id);
            saveTrades();
            renderTrades();
            updateStats();
        }

        function saveTrades() {
            localStorage.setItem('trades', JSON.stringify(trades));
        }

        function renderTrades() {
            tradesBody.innerHTML = '';
            if (trades.length === 0) {
                noTrades.style.display = 'block';
                return;
            }
            noTrades.style.display = 'none';
            trades.forEach(trade => {
                const row = document.createElement('tr');
                const profitClass = trade.profitLoss >= 0 ? 'profit-value' : 'loss-value';
                const sign = trade.profitLoss >= 0 ? '+' : '';
                row.innerHTML = `
                    <td>${formatDate(trade.date)}</td>
                    <td>${trade.symbol}</td>
                    <td>${trade.type.charAt(0).toUpperCase() + trade.type.slice(1)}</td>
                    <td class="${profitClass}">${sign}$${trade.profitLoss.toFixed(2)}</td>
                    <td>${trade.notes || '-'}</td>
                    <td><button class="delete-btn" onclick="deleteTrade(${trade.id})">Delete</button></td>
                `;
                tradesBody.appendChild(row);
            });
        }

        function updateStats() {
            const totalTrades = trades.length;
            const totalProfit = trades.reduce((sum, trade) => sum + trade.profitLoss, 0);
            const winningTrades = trades.filter(trade => trade.profitLoss > 0).length;
            const winRate = totalTrades > 0 ? (winningTrades / totalTrades * 100) : 0;
            const avgTrade = totalTrades > 0 ? totalProfit / totalTrades : 0;

            document.getElementById('totalTrades').textContent = totalTrades;
            const profitEl = document.getElementById('totalProfit');
            const sign = totalProfit >= 0 ? '+' : '';
            profitEl.textContent = `${sign}$${totalProfit.toFixed(2)}`;
            
            const profitCard = document.getElementById('profitCard');
            profitCard.classList.remove('profit', 'loss');
            profitCard.classList.add(totalProfit >= 0 ? 'profit' : 'loss');

            document.getElementById('winRate').textContent = `${winRate.toFixed(1)}%`;
            document.getElementById('avgTrade').textContent = `${sign}$${avgTrade.toFixed(2)}`;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        renderTrades();
        updateStats();
    </script>
</body>
</html>
